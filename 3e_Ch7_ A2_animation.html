<!DOCTYPE html>
<html lang="fr">
<head>

    <style>

        header { width: 100%; max-width: 1100px; text-align: center; background-color: var(--header-bg); padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); color: white; }

        .student-instructions { width: 100%; max-width: 1060px; background: #fff3cd; border-left: 6px solid #f39c12; padding: 15px 20px; border-radius: 6px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .student-instructions h3 { margin-top: 0; color: #856404; display: flex; align-items: center; }
        .student-instructions p { margin: 5px 0; font-size: 1.05rem; line-height: 1.4; }

        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1100px; width: 100%; margin-bottom: 30px; }
        .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column; align-items: center; width: 350px; position: relative; }
        .panel-label { position: absolute; top: 10px; left: 10px; background-color: var(--label-bg); padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .card h2 { font-size: 1.1rem; color: var(--accent-blue); margin-top: 25px; text-align: center; height: 50px; }
        canvas { border: 1px solid #ddd; border-radius: 6px; background-color: #a7d9f7; margin-bottom: 15px; }

<body>

    <header>
        <h1>Les Effets des Actions Mécaniques</h1>
    </header>

    <div class="student-instructions">
        <h3>📝 Consignes pour l'activité :</h3>
        <p>1. Observe les trois situations <b>A, B et C</b> ci-dessous en cliquant sur les boutons d'action.</p>
        <p>2. Pour chaque expérience, identifie l'effet produit et complète la partie <b>1. Les effets d'une action mécanique</b> de ta fiche de cours.</p>
        <p>3. Réponds ensuite au quiz complet en bas de page pour vérifier tes connaissances.</p>
    </div>

    <div class="container">
        <div class="card" id="cardA">
            <span class="panel-label">A</span>
            <h2>A. MISE EN MOUVEMENT<br>(Force sur un objet immobile)</h2>
            <canvas id="canvasA" width="320" height="240"></canvas>
            <div class="controls">
                <button class="start" id="btnA">Tirer</button>
                <button class="reset" onclick="resetA()">Réinitialiser</button>
            </div>
            <div class="physics-label" id="labelA">⚡ ACTION : Mise en mouvement</div>
        </div>

        <div class="card" id="cardB">
            <span class="panel-label">B</span>
            <h2>B. MODIFICATION DE TRAJECTOIRE<br>(Force sur un objet en mouvement)</h2>
            <canvas id="canvasB" width="320" height="240"></canvas>
            <div class="controls">
                <button class="start" id="btnB">Renvoyer</button>
                <button class="reset" onclick="resetB()">Réinitialiser</button>
            </div>
            <div class="physics-label" id="labelB">⚡ ACTION : Changement de vitesse/direction</div>
        </div>

        <div class="card" id="cardC">
            <span class="panel-label">C</span>
            <h2>C. DÉFORMATION<br>(Force modifie la forme d'un objet)</h2>
            <canvas id="canvasC" width="320" height="240"></canvas>
            <div class="controls">
                <button class="start" id="btnC">Sauter</button>
                <button class="reset" onclick="resetAnimationC()">Réinitialiser</button>
            </div>
            <div class="physics-label" id="labelC">⚡ ACTION : Déformation de la perche</div>
        </div>
    </div>

    <div class="quiz-section">
        <h2>Validation des acquis</h2>
        
        <div class="quiz-item" id="q1">
            <p>1. Dans la situation C (Saut à la perche), quel est l'effet principal modélisé par la flèche rouge ?</p>
            <div class="options">
                <button class="option" onclick="checkQ(this, 'c')">La déformation de la perche</button>
                <button class="option" onclick="checkQ(this, 'a')">La mise en mouvement de l'athlète</button>
                <button class="option" onclick="checkQ(this, 'b')">L'arrêt de l'athlète</button>
            </div>
            <div class="quiz-feedback"></div>
        </div>

        <div class="quiz-item" id="q2">
            <p>2. Dans quelle situation la force permet-elle de modifier la trajectoire d'un objet qui est DÉJÀ en mouvement ?</p>
            <div class="options">
                <button class="option" onclick="checkQ(this, 'a')">Situation A (Le footballeur)</button>
                <button class="option" onclick="checkQ(this, 'b')">Situation B (Le tennisman)</button>
                <button class="option" onclick="checkQ(this, 'c')">Situation C (Le perchiste)</button>
            </div>
            <div class="quiz-feedback"></div>
        </div>

        <div class="quiz-item" id="q3">
            <p>3. Quel outil mathématique utilise-t-on pour "modéliser" (représenter) ces actions mécaniques sur les dessins ?</p>
            <div class="options">
                <button class="option" onclick="checkQ(this, 'correct')">Un vecteur Force (une flèche)</button>
                <button class="option" onclick="checkQ(this, 'wrong')">Une courbe de température</button>
                <button class="option" onclick="checkQ(this, 'wrong')">Un chronomètre</button>
            </div>
            <div class="quiz-feedback"></div>
        </div>
    </div>

    <script>
        function drawArrow(ctx, fromX, fromY, toX, toY, color = 'red', width = 4) {
            const headlen = 10; const angle = Math.atan2(toY - fromY, toX - fromX);
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY); ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6)); ctx.moveTo(toX, toY); ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6)); ctx.strokeStyle = color; ctx.lineWidth = width; ctx.stroke(); ctx.fillStyle = color; ctx.font = 'bold 16px sans-serif'; ctx.fillText('F', toX + 15 * Math.cos(angle), toY + 15 * Math.sin(angle));
        }

        function drawGrass(ctx, w, h) { ctx.fillStyle = '#6ab04c'; ctx.fillRect(0, h - 30, w, 30); ctx.fillStyle = '#4a7d3a'; for(let i = 0; i < w; i += 10) ctx.fillRect(i, h - 30, 2, 5); }
        function drawDetailedHead(ctx, x, y, size=12) { ctx.fillStyle = '#f1c27d'; ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2); ctx.fill(); }

        // Logic for A, B, and C as per original source
        const ctxA = document.getElementById('canvasA').getContext('2d');
        const labelA = document.getElementById('labelA');
        let stateA = { phase: 'idle', legAngle: 0, ballX: 120, ballY: 200, ballVx: 0, ballVy: 0, showForce: false };
        function drawFootPlayer(ctx, legAngle) {
            ctx.fillStyle = '#0a3d91'; ctx.fillRect(60, 100, 30, 50); ctx.fillStyle = '#fff'; ctx.fillRect(60, 150, 30, 15); ctx.fillStyle = 'white'; ctx.font = 'bold 16px sans-serif'; ctx.fillText('25', 68, 125); drawDetailedHead(ctx, 75, 85); ctx.fillStyle = '#f1c27d'; ctx.fillRect(65, 165, 8, 28); ctx.fillStyle = '#333'; ctx.fillRect(65, 193, 10, 8); ctx.save(); ctx.translate(80, 160); ctx.rotate(legAngle); ctx.fillStyle = '#f1c27d'; ctx.fillRect(-5, 0, 10, 35); ctx.fillStyle = 'black'; ctx.fillRect(-5, 30, 15, 10); ctx.restore();
        }
        function updateA() {
            ctxA.clearRect(0, 0, 320, 240); drawGrass(ctxA, 320, 240);
            if (stateA.phase === 'swinging') { stateA.legAngle += 0.2; if (stateA.legAngle > 0.8) { stateA.phase = 'kicked'; stateA.ballVx = 8; stateA.ballVy = -6; stateA.showForce = true; setTimeout(() => { stateA.showForce = false; labelA.style.display = 'block'; }, 300); } } 
            else if (stateA.phase === 'kicked') { stateA.legAngle = Math.max(0, stateA.legAngle - 0.05); stateA.ballX += stateA.ballVx; stateA.ballY += stateA.ballVy; stateA.ballVy += 0.4; if (stateA.ballY >= 200) { stateA.ballY = 200; stateA.ballVy *= -0.6; stateA.ballVx *= 0.8; } }
            drawFootPlayer(ctxA, stateA.legAngle); ctxA.fillStyle = 'white'; ctxA.beginPath(); ctxA.arc(stateA.ballX, stateA.ballY, 10, 0, Math.PI*2); ctxA.fill(); ctxA.strokeStyle = 'black'; ctxA.lineWidth = 1; ctxA.stroke(); if (stateA.showForce) drawArrow(ctxA, 110, 200, 160, 165, 'red', 4); requestAnimationFrame(updateA);
        }
        function resetA() { stateA = { phase: 'idle', legAngle: 0, ballX: 120, ballY: 200, ballVx: 0, ballVy: 0, showForce: false }; labelA.style.display = 'none'; }
        document.getElementById('btnA').addEventListener('click', () => { resetA(); stateA.phase = 'swinging'; stateA.legAngle = -0.5; });
        updateA();

        const ctxB = document.getElementById('canvasB').getContext('2d');
        const labelB = document.getElementById('labelB');
        let stateB = { ballX: 350, ballY: 50, ballVx: -6, ballVy: 3, phase: 'idle', showForce: false, racketAngle: 0 };
        function drawTennisPlayerDetailed(ctx, racketAngle) {
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(40, 100, 30, 60); drawDetailedHead(ctx, 55, 80); ctx.fillStyle = '#f1c27d'; ctx.fillRect(45, 160, 9, 30); ctx.fillStyle = '#fff'; ctx.fillRect(45, 190, 12, 10); ctx.fillStyle = '#f1c27d'; ctx.fillRect(60, 160, 9, 30); ctx.fillStyle = '#fff'; ctx.fillRect(60, 190, 12, 10); ctx.save(); ctx.translate(70, 115); ctx.rotate(racketAngle); ctx.fillStyle = '#f1c27d'; ctx.fillRect(0, -5, 35, 10); ctx.fillStyle = '#8e44ad'; ctx.fillRect(35, -5, 30, 10); ctx.strokeStyle = '#333'; ctx.lineWidth = 3; ctx.beginPath(); ctx.ellipse(80, 0, 20, 15, 0, 0, Math.PI*2); ctx.stroke(); ctx.fillStyle = 'rgba(211, 211, 211, 0.7)'; ctx.fill(); ctx.restore();
        }
        function updateB() {
            ctxB.clearRect(0, 0, 320, 240); ctxB.fillStyle = '#d35400'; ctxB.fillRect(0, 200, 320, 40); drawTennisPlayerDetailed(ctxB, stateB.racketAngle);
            if (stateB.phase === 'incoming') { stateB.ballX += stateB.ballVx; stateB.ballY += stateB.ballVy; if (stateB.ballX <= 145 && stateB.ballY >= 140) { stateB.phase = 'outgoing'; stateB.ballVx = 8; stateB.ballVy = -4; stateB.showForce = true; setTimeout(() => { stateB.showForce = false; labelB.style.display = 'block'; }, 400); } } 
            else if (stateB.phase === 'outgoing') { stateB.ballX += stateB.ballVx; stateB.ballY += stateB.ballVy; stateB.ballVy += 0.25; }
            ctxB.fillStyle = '#ccff00'; ctxB.beginPath(); ctxB.arc(stateB.ballX, stateB.ballY, 7, 0, Math.PI*2); ctxB.fill(); ctxB.strokeStyle = '#999'; ctxB.stroke(); if (stateB.showForce) drawArrow(ctxB, 110, 150, 170, 110, 'red', 4); requestAnimationFrame(updateB);
        }
        function resetB() { stateB = { ballX: 350, ballY: 50, ballVx: -6, ballVy: 3, phase: 'idle', showForce: false, racketAngle: 0 }; labelB.style.display = 'none'; }
        document.getElementById('btnB').addEventListener('click', () => { resetB(); stateB.phase = 'incoming'; stateB.ballVx = -7; stateB.ballVy = 3.5; stateB.racketAngle = 0.2; });
        updateB();

        const ctxC = document.getElementById('canvasC').getContext('2d');
        const labelC = document.getElementById('labelC');
        const ST_IDLE = 0, ST_RUN = 1, ST_PLANT = 2, ST_ROCKBACK = 3, ST_FALL = 4, ST_LAND = 5;
        let simC = { state: ST_IDLE, frame: 0, athleteX: 10, athleteY: 175, vaultPhase: 0, vx: 0, vy: 0, angle: 0 };
        function drawAthleteC(x, y, scale = 1, pose = 'run') {
            ctxC.save(); ctxC.translate(x, y); ctxC.scale(scale, scale); ctxC.strokeStyle = '#222'; ctxC.fillStyle = '#ddd'; ctxC.lineWidth = 4; ctxC.lineCap = 'round';
            const headSize = 12; const torsoH = 40; const thighL = 25; const shinL = 25;
            ctxC.fillStyle = '#f1c27d'; ctxC.beginPath(); ctxC.arc(0, -torsoH - headSize, headSize, 0, Math.PI*2); ctxC.fill(); ctxC.stroke();
            ctxC.fillStyle = '#a8e6cf'; ctxC.fillRect(-10, -torsoH, 20, torsoH); ctxC.fillStyle = '#28a745'; ctxC.fillRect(-10, 0, 20, 10);
            let legL = 0, kneeL = 0, legR = 0, kneeR = 0;
            if (pose === 'run') { const phase = simC.frame / 5; legL = Math.sin(phase) * 0.8; kneeL = Math.max(0, Math.sin(phase - Math.PI/2) * 1.5); legR = Math.sin(phase + Math.PI) * 0.8; kneeR = Math.max(0, Math.sin(phase + Math.PI/2) * 1.5); }
            else if (pose === 'plant') { legL = 0.5; kneeL = 0; legR = -1.5; kneeR = 1.8; }
            else if (pose === 'rockback') { legL = -1.2; kneeL = 0.5; legR = -1.5; kneeR = 1.8; }
            else if (pose === 'land') { legL = -1.5; kneeL = 0.2; legR = -1.4; kneeR = 0.2; }
            function drawLeg(lAngle, kAngle, isFront) { ctxC.save(); ctxC.translate(0, 0); ctxC.rotate(lAngle); ctxC.fillStyle = '#f1c27d'; ctxC.fillRect(-4, 0, 8, thighL); ctxC.translate(0, thighL); ctxC.rotate(kAngle); ctxC.fillRect(-4, 0, 8, shinL); ctxC.fillStyle = '#555'; ctxC.fillRect(-4, shinL - 2, 10, 8); ctxC.restore(); }
            drawLeg(legL, kneeL, false); drawLeg(legR, kneeR, true);
            if (pose !== 'land') { ctxC.save(); ctxC.translate(0, -torsoH + 5); ctxC.rotate(-2.5); ctxC.fillStyle = '#f1c27d'; ctxC.fillRect(-4, 0, 8, 35); ctxC.fillRect(4, 0, 8, 35); ctxC.restore(); } ctxC.restore();
        }
        function updateC() {
            simC.frame++; ctxC.clearRect(0, 0, 320, 240);
            ctxC.fillStyle = '#95a5a6'; ctxC.fillRect(0, 225, 160, 15); ctxC.fillStyle = '#3498db'; ctxC.fillRect(160, 160, 160, 80); ctxC.fillStyle = '#2980b9'; ctxC.fillRect(160, 160, 160, 10); ctxC.fillStyle = '#333'; ctxC.fillRect(150, 215, 10, 10);
            let pHandX = simC.athleteX - 25, pHandY = simC.athleteY - 60; let showForce = false; let bendFactor = 0;
            if (simC.state === ST_RUN) { simC.athleteX += 3.5; if (simC.athleteX >= 110) simC.state = ST_PLANT; }
            else if (simC.state === ST_PLANT) { simC.vaultPhase += 0.02; simC.athleteX = 110 + 30 * simC.vaultPhase; simC.athleteY = 175 - 20 * simC.vaultPhase; bendFactor = Math.sin(simC.vaultPhase * Math.PI); if (bendFactor > 0.6) showForce = true; if (simC.vaultPhase >= 1) { simC.state = ST_ROCKBACK; simC.vaultPhase = 0; } }
            else if (simC.state === ST_ROCKBACK) { simC.vaultPhase += 0.03; simC.athleteX = 140 + 50 * simC.vaultPhase; simC.athleteY = 155 - 90 * Math.sin(simC.vaultPhase * Math.PI / 2); simC.angle = -simC.vaultPhase * Math.PI / 1.5; if (simC.vaultPhase >= 1) { simC.state = ST_FALL; simC.vx = 2; simC.vy = 0; } }
            else if (simC.state === ST_FALL) { simC.athleteX += simC.vx; simC.athleteY += simC.vy; simC.vy += 0.4; simC.angle -= 0.05; if (simC.athleteY >= 150) { simC.athleteY = 150; simC.state = ST_LAND; simC.angle = -Math.PI / 2; labelC.style.display = 'block'; } }
            if (simC.state === ST_RUN || simC.state === ST_PLANT || simC.state === ST_ROCKBACK) {
                ctxC.save(); ctxC.strokeStyle = '#eee'; ctxC.lineWidth = 5; ctxC.lineCap = 'round'; ctxC.beginPath();
                if (simC.state === ST_RUN) { ctxC.moveTo(pHandX, pHandY); ctxC.lineTo(pHandX + 100, 225 - 80); ctxC.stroke(); }
                else { const anchorX = 155, anchorY = 220; const cp1x = anchorX + (100 * bendFactor); const cp1y = anchorY - (80 * bendFactor); const cp2x = pHandX + (100 * bendFactor); const cp2y = pHandY + (40 * bendFactor); ctxC.moveTo(anchorX, anchorY); ctxC.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, pHandX, pHandY); ctxC.stroke(); if (showForce) drawArrow(ctxC, pHandX + 30, pHandY + 50, pHandX + 80, pHandY + 90, 'red', 4); } ctxC.restore();
            }
            ctxC.save(); ctxC.translate(simC.athleteX, simC.athleteY); ctxC.rotate(simC.angle); if (simC.state === ST_RUN) drawAthleteC(0, 0, 1, 'run'); else if (simC.state === ST_PLANT) drawAthleteC(0, 0, 1, 'plant'); else if (simC.state === ST_LAND) drawAthleteC(0, 0, 1, 'land'); else drawAthleteC(0, 0, 1, 'rockback'); ctxC.restore(); requestAnimationFrame(updateC);
        }
        function resetAnimationC() { simC = { state: ST_IDLE, frame: 0, athleteX: 10, athleteY: 175, vaultPhase: 0, vx: 0, vy: 0, angle: 0 }; labelC.style.display = 'none'; }
        document.getElementById('btnC').addEventListener('click', () => { if (simC.state === ST_IDLE) simC.state = ST_RUN; });
        resetAnimationC(); updateC();

        function checkQ(btn, answerType) {
            const item = btn.closest('.quiz-item'); const feedback = item.querySelector('.quiz-feedback'); const options = item.querySelectorAll('.option'); options.forEach(opt => opt.classList.remove('correct', 'incorrect'));
            let isCorrect = (item.id === 'q1' && answerType === 'c') || (item.id === 'q2' && answerType === 'b') || (item.id === 'q3' && answerType === 'correct');
            if (isCorrect) { btn.classList.add('correct'); feedback.innerHTML = '✅ <strong>Excellent !</strong> C\'est la bonne réponse.'; feedback.style.color = 'var(--accent-green)'; } 
            else { btn.classList.add('incorrect'); feedback.innerHTML = '❌ <strong>Incorrect.</strong> Observe bien les animations et réessaie !'; feedback.style.color = 'var(--accent-red)'; }
            feedback.style.display = 'block';
        }
    </script>

<!DOCTYPE html>
<html lang="fr">
<head>

    <title>Représentation d'une force : le vecteur force</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
            --accent-orange: #f39c12;
        }

<body>

    <header>
        <h1>Représentation d'une force : le vecteur force</h1>
        <p class="subtitle">On représente une force par une flèche appelée <b>vecteur force</b>.</p>
    </header>

    <div class="student-instructions">
        <h3>📝 Consignes pour l'activité :</h3>
        <p>1. Observe la <b>flèche rouge</b> dans les 8 situations ci-dessous.</p>
        <p>2. Clique sur <b>"Lancer le mouvement"</b> pour voir l'effet de l'action mécanique.</p>
        <p>3. Identifie la caractéristique demandée et complète ta fiche de cours.</p>
    </div>

    <div class="controls-main">
        <button id="playPauseBtn" onclick="toggleMovement()">
            <span id="btnIcon">▶</span> <span id="btnText">Lancer le mouvement</span>
        </button>
    </div>

    <div class="definition-box">
        <h2>Rappel : Pourquoi utiliser une flèche ?</h2>
        <ul class="definition-list">
            <li><b>Modélisation :</b> La flèche permet de visualiser l'action mécanique.</li>
            <li><b>Direction et Sens :</b> La flèche suit la droite d'action et pointe vers l'orientation de la force.</li>
            <li><b>Intensité :</b> Plus la flèche est épaisse ou longue, plus la force est intense.</li>
            <li><b>Point d'application :</b> C'est l'origine (le départ) de la flèche.</li>
        </ul>
    </div>

    <div class="important-note">
        <b>Précision sur le point d'application :</b> Contact = point de contact. Poids = centre de gravité.
    </div>

    <div class="quiz-grid" id="quizGrid"></div>

    <div class="score-panel" id="scorePanel">
        Score final : <span id="scoreValue" style="color: var(--accent-blue); font-size: 2.5rem;">0</span> / 8
        <br>
        <button class="reset-btn" onclick="resetQuiz()">Recommencer l'exercice</button>
    </div>

    <script>
        const quizData = [
            { id: 0, category: "Point d'application", visual: { arrow: [40, 45, 100, 45], width: 4, action: 'push_right' }, options: ["En haut à droite", "En haut à gauche", "En bas à droite", "En bas à gauche"], correct: 1 },
            { id: 1, category: "Direction", visual: { arrow: [120, 45, 160, 25], width: 4, action: 'pull_right' }, options: ["Celle du bras", "Celle de la jambe"], correct: 0 },
            { id: 2, category: "Sens", visual: { arrow: [40, 75, 100, 75], width: 4, action: 'push_right' }, options: ["Vers la droite", "Vers la gauche"], correct: 0 },
            { id: 3, category: "Intensité", visual: { arrow: [120, 75, 150, 75], width: 2, action: 'pull_right' }, options: ["Faible (flèche fine)", "Forte (flèche épaisse)"], correct: 0 },
            { id: 4, category: "Point d'application", visual: { arrow: [120, 45, 60, 45], width: 4, action: 'push_left' }, options: ["En haut à droite", "En haut à gauche", "En bas à droite", "En bas à gauche"], correct: 0 },
            { id: 5, category: "Direction", visual: { arrow: [120, 45, 80, 75], width: 4, action: 'push_left_down' }, options: ["Celle du bras", "Celle de la jambe"], correct: 0 },
            { id: 6, category: "Sens", visual: { arrow: [120, 75, 60, 75], width: 4, action: 'push_left' }, options: ["Vers la droite", "Vers la gauche"], correct: 1 },
            { id: 7, category: "Intensité", visual: { arrow: [120, 75, 210, 75], width: 7, action: 'pull_right_strong' }, options: ["Faible (flèche fine)", "Forte (flèche épaisse)"], correct: 1 }
        ];

        let score = 0;
        let answeredCount = 0;
        let animFrameId;
        let isMoving = false;
        let timeCounter = 0;

        function toggleMovement() {
            isMoving = !isMoving;
            const btn = document.getElementById('playPauseBtn');
            document.getElementById('btnIcon').innerText = isMoving ? "⏸" : "▶";
            document.getElementById('btnText').innerText = isMoving ? "Arrêter le mouvement" : "Lancer le mouvement";
            btn.classList.toggle('active', isMoving);
        }

        function drawForceVector(ctx, fromX, fromY, toX, toY, width) {
            const headlen = 12 + width; 
            const angle = Math.atan2(toY - fromY, toX - fromX);
            ctx.beginPath(); ctx.moveTo(fromX, fromY); ctx.lineTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = width; ctx.stroke();
        }

        function drawVolumetricMover(ctx, action, appX, appY, offsetX, offsetY) {
            ctx.save();
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            const curAppX = appX + offsetX;
            const curAppY = appY + offsetY;
            let shoulderX, shoulderY, hipX;

            if (action === 'push_right') {
                shoulderX = curAppX - 35; shoulderY = curAppY - 5;
                hipX = shoulderX - 10; 
            } else if (action.includes('pull_right')) {
                shoulderX = curAppX + 35; shoulderY = curAppY - 10;
                hipX = shoulderX + 15; 
            } else if (action === 'push_left_down') {
                /* CORRECTION ICI : Le bras est maintenant incliné vers le bas */
                shoulderX = curAppX + 32; shoulderY = curAppY - 24;
                hipX = shoulderX + 10; 
            } else {
                shoulderX = curAppX + 35; shoulderY = curAppY - 5;
                hipX = shoulderX + 10; 
            }

            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 11;
            ctx.beginPath(); ctx.moveTo(hipX, 120-35); ctx.lineTo(hipX - 15, 120-5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(hipX, 120-35); ctx.lineTo(hipX + 15, 120-5); ctx.stroke();
            ctx.strokeStyle = '#34495e'; ctx.lineWidth = 24; ctx.beginPath(); ctx.moveTo(hipX, 120-35); ctx.lineTo(shoulderX, shoulderY); ctx.stroke();
            ctx.fillStyle = '#f1c27d'; ctx.beginPath(); ctx.arc(shoulderX, shoulderY - 18, 10, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = '#95a5a6'; ctx.lineWidth = 7; ctx.beginPath(); ctx.moveTo(shoulderX, shoulderY); ctx.lineTo(curAppX, curAppY); ctx.stroke();
            ctx.restore();
        }

        function renderScene(canvasId, visualData, time) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const dxF = visualData.arrow[2] - visualData.arrow[0];
            const dyF = visualData.arrow[3] - visualData.arrow[1];
            const forceLen = Math.hypot(dxF, dyF) || 1;
            const amplitude = visualData.width * 1.5; 
            const pulse = isMoving ? Math.sin(time / 180) : 0;
            const offsetX = (dxF / forceLen) * pulse * amplitude;
            const offsetY = (dyF / forceLen) * pulse * amplitude;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ecf0f1'; ctx.fillRect(0, 120, canvas.width, 30);
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(40 + offsetX, 40 + offsetY, 80, 70);
            ctx.strokeStyle = '#f39c12'; ctx.lineWidth = 2; ctx.strokeRect(40 + offsetX, 40 + offsetY, 80, 70);
            drawVolumetricMover(ctx, visualData.action, visualData.arrow[0], visualData.arrow[1], offsetX, offsetY);
            drawForceVector(ctx, visualData.arrow[0] + offsetX, visualData.arrow[1] + offsetY, visualData.arrow[2] + offsetX, visualData.arrow[3] + offsetY, visualData.width);
        }

        function animate(time) {
            if (isMoving) timeCounter = time;
            quizData.forEach(q => { renderScene(`canvas-${q.id}`, q.visual, timeCounter); });
            animFrameId = requestAnimationFrame(animate);
        }

        function generateQuiz() {
            const grid = document.getElementById('quizGrid');
            grid.innerHTML = ''; score = 0; answeredCount = 0;
            document.getElementById('scorePanel').style.display = 'none';
            quizData.forEach(q => {
                const card = document.createElement('div');
                card.className = 'card'; card.id = `card-${q.id}`;
                card.innerHTML = `<div class="card-header">${q.category}</div><div class="canvas-container"><canvas id="canvas-${q.id}" width="240" height="150"></canvas></div><div class="options-container" id="opt-${q.id}"></div>`;
                grid.appendChild(card);
                q.options.forEach((optText, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn'; btn.innerText = optText;
                    btn.onclick = () => handleAnswer(q.id, index, btn);
                    document.getElementById(`opt-${q.id}`).appendChild(btn);
                });
            });
            if (animFrameId) cancelAnimationFrame(animFrameId);
            animFrameId = requestAnimationFrame(animate);
        }

        function handleAnswer(questionId, selectedIndex, buttonElement) {
            const question = quizData[questionId];
            const card = document.getElementById(`card-${questionId}`);
            const buttons = card.querySelectorAll('.option-btn');
            if (card.classList.contains('correct') || card.classList.contains('incorrect')) return;
            buttons.forEach(btn => btn.disabled = true);
            if (selectedIndex === question.correct) {
                buttonElement.classList.add('selected-correct');
                card.classList.add('correct'); score++;
            } else {
                buttonElement.classList.add('selected-incorrect');
                card.classList.add('incorrect');
                buttons[question.correct].classList.add('show-correct');
            }
            answeredCount++;
            if (answeredCount === 8) {
                const panel = document.getElementById('scorePanel');
                document.getElementById('scoreValue').innerText = score;
                panel.style.display = 'block';
                panel.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function resetQuiz() { generateQuiz(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        window.onload = generateQuiz;
    </script>
</body>

                </div>
                
                <div class="question-card" id="q2">
                    <p class="q-text">2. Quelle est l'unité de la force affichée en rouge sur l'appareil ?</p>
                    <div class="options">
                        <button onclick="checkA(2, this, false, 'Le kg est pour la masse.')">Le kilogramme (kg)</button>
                        <button onclick="checkA(2, this, true, 'Parfait ! Le symbole est N.')">Le Newton (N)</button>
                        <button onclick="checkA(2, this, false, 'Le mètre est pour la longueur.')">Le mètre (m)</button>
                    </div>
                    <div class="feedback" id="fb-q2"></div>
                </div>

                <div class="question-card" id="q3">
                    <p class="q-text">3. Observe : 0,1 kg -> 1 N et 0,5 kg -> 5 N. Quelle est la règle sur Terre ?</p>
                    <div class="options">
                        <button onclick="checkA(3, this, false, '0,1 n\'est pas égal à 1.')">Poids = Masse</button>
                        <button onclick="checkA(3, this, true, 'Excellent ! On multiplie la masse en kg par environ 10.')">Poids (N) = Masse (kg) × 10</button>
                        <button onclick="checkA(3, this, false, 'C\'est l\'inverse.')">Masse = Poids × 10</button>
                    </div>

                <div class="question-card" id="q4">
                    <p class="q-text">4. Quel serait le poids d'un sac de riz de 3 kg ?</p>
                    <div class="options">
                        <button onclick="checkA(4, this, false, 'Applique la règle : × 10.')">3 N</button>
                        <button onclick="checkA(4, this, true, 'Bravo ! 3 kg × 10 = 30 N.')">30 N</button>
                        <button onclick="checkA(4, this, false, 'Erreur de calcul.')">300 N</button>
                    </div>
                    <div class="feedback" id="fb-q4"></div>
                </div>

        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const digitalDisplay = document.getElementById('digitalValue');

        const g_display = 10.0; 
        const pixelsPerNewton = 45; 
        const maxForceN = 5; 
        const dynaX = 120;
        const dynaTopY = 30;
        const dynaHeight = 310;
        const zeroY = dynaTopY + 50; 
        const rodLength = 260; 

        let targetForce = 0; 
        let currentForce = 0; 
        let velocity = 0; 

        let objects = [
            { id: 1, mass: 0.1, type: 'pomme', label: 'Pomme', x: 340, y: 150, startX: 340, startY: 150, radius: 25, isHooked: false },
            { id: 2, mass: 0.25, type: 'trousse', label: 'Trousse', x: 340, y: 300, startX: 340, startY: 300, radius: 32, isHooked: false },
            { id: 3, mass: 0.5, type: 'poids', label: 'Poids fonte', x: 340, y: 480, startX: 340, startY: 480, radius: 40, isHooked: false }
        ];

        let activeDragObj = null;

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { x: (evt.clientX - rect.left) * scaleX, y: (evt.clientY - rect.top) * scaleY };
        }

        // --- GESTION DU TACTILE ET DE LA SOURIS (Optimisation iPad) ---
        function handleStart(pos) {
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                if (Math.hypot(pos.x - obj.x, pos.y - obj.y) < obj.radius + 20) { 
                    activeDragObj = obj;
                    if (obj.isHooked) { obj.isHooked = false; updateHookForce(); }
                    break;
                }
            }
        }

        // Souris
        canvas.addEventListener('mousedown', (e) => {
            handleStart(getMousePos(e));
        });
        window.addEventListener('mousemove', (e) => {
            if (activeDragObj) {
                const pos = getMousePos(e);
                activeDragObj.x = pos.x; activeDragObj.y = pos.y;
            }
        });

        // Tactile
        function getTouchPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = evt.touches[0] || evt.changedTouches[0];
            return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
        }

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Empêche le défilement de la page sur iPad
            handleStart(getTouchPos(e));
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if (activeDragObj) {
                e.preventDefault();
                const pos = getTouchPos(e);
                activeDragObj.x = pos.x; activeDragObj.y = pos.y;
            }
        }, {passive: false});

        window.addEventListener('mouseup', handleDrop);
        window.addEventListener('touchend', handleDrop);
        window.addEventListener('touchcancel', handleDrop);

        function handleDrop() {
            if (!activeDragObj) return;
            let currentHookY = (zeroY + (currentForce * pixelsPerNewton)) + rodLength;
            if (Math.hypot(activeDragObj.x - dynaX, activeDragObj.y - currentHookY) < 80) { 
                objects.forEach(o => { if (o.isHooked) { o.isHooked = false; animateBack(o); } });
                activeDragObj.isHooked = true;
                updateHookForce();
            } else { animateBack(activeDragObj); }
            activeDragObj = null;
        }
        // -----------------------------------------------------------

        function updateHookForce() {
            let m = 0; objects.forEach(o => { if(o.isHooked) m = o.mass; });
            targetForce = m * g_display;
            velocity += (targetForce > currentForce) ? 4 : -4; 
        }

        function animateBack(obj) {
            let step = 0; let initX = obj.x; let initY = obj.y;
            function move() {
                if (obj.isHooked || activeDragObj === obj) return;
                step += 0.08;
                if (step >= 1) { obj.x = obj.startX; obj.y = obj.startY; return; }
                let ease = 1 - Math.pow(1 - step, 3);
                obj.x = initX + (obj.startX - initX) * ease;
                obj.y = initY + (obj.startY - initY) * ease;
                requestAnimationFrame(move);
            }
            move();
        }

        function animate() {
            const stiffness = 0.15; const damping = 0.82;
            velocity += (targetForce - currentForce) * stiffness;
            velocity *= damping;
            currentForce += velocity;
            if (Math.abs(velocity) < 0.001) currentForce = targetForce;

            digitalDisplay.innerText = Math.max(0, currentForce).toFixed(2);
            
            let hookY = (zeroY + (currentForce * pixelsPerNewton)) + rodLength;
            objects.forEach(o => { if (o.isHooked) { o.x = dynaX; o.y = hookY + o.radius + 8; } });

            render();
            requestAnimationFrame(animate);
        }

        function drawPomme(ctx, x, y, r, txt) {
            ctx.save(); ctx.translate(x, y);
            ctx.strokeStyle = '#5c2a16'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(0, -r+5); ctx.quadraticCurveTo(5, -r-10, 10, -r-10); ctx.stroke();
            ctx.fillStyle = '#27ae60'; ctx.beginPath(); ctx.ellipse(12, -r-5, 8, 4, Math.PI/4, 0, Math.PI*2); ctx.fill();
            let grad = ctx.createRadialGradient(-5, -5, 0, 0, 0, r);
            grad.addColorStop(0, '#f1c40f'); grad.addColorStop(0.3, '#e74c3c'); grad.addColorStop(1, '#922b21');
            ctx.fillStyle = grad; ctx.beginPath(); ctx.moveTo(0, r-5); ctx.bezierCurveTo(r, r, r, -r+5, 0, -r+5); ctx.bezierCurveTo(-r, -r+5, -r, r, 0, r-5); ctx.fill();
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, -r-8, 6, 0, Math.PI*2); ctx.stroke();
            drawTxt(ctx, txt); ctx.restore();
        }

        function drawTrousse(ctx, x, y, r, txt) {
            ctx.save(); ctx.translate(x, y);
            let w = r*2.2, h = r*1.4;
            let grad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
            grad.addColorStop(0, '#2980b9'); grad.addColorStop(0.5, '#5dade2'); grad.addColorStop(1, '#2980b9');
            ctx.fillStyle = grad; ctx.beginPath(); roundRect(ctx, -w/2, -h/2, w, h, 10); ctx.fill();
            ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 3; ctx.setLineDash([4, 3]);
            ctx.beginPath(); ctx.moveTo(-w/2 + 10, -h/2 + 15); ctx.lineTo(w/2 - 10, -h/2 + 15); ctx.stroke();
            ctx.setLineDash([]); ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(-w/2, -h/2, 6, 0, Math.PI*2); ctx.stroke();
            drawTxt(ctx, txt); ctx.restore();
        }

        function drawPoids(ctx, x, y, r, txt) {
            ctx.save(); ctx.translate(x, y);
            ctx.fillStyle = '#4a5359'; ctx.beginPath();
            for(let i=0; i<6; i++) { let a = (Math.PI/3)*i+Math.PI/6; ctx.lineTo(r*Math.cos(a), r*Math.sin(a)); }
            ctx.closePath(); ctx.fill(); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = '#5c666a'; ctx.beginPath(); ctx.arc(0, 0, r*0.6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(0, -r-8, 6, 0, Math.PI*2); ctx.stroke();
            drawTxt(ctx, txt); ctx.restore();
        }

        function drawTxt(ctx, t) {
            ctx.fillStyle = 'white'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
            ctx.shadowColor = "black"; ctx.shadowBlur = 4; ctx.fillText(t, 0, 5); ctx.shadowBlur = 0;
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r);
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Etagère
            ctx.fillStyle = '#ecf0f1'; ctx.fillRect(260, 0, 190, canvas.height);
            ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 4;
            [220, 360, 540].forEach(y => { ctx.beginPath(); ctx.moveTo(260, y); ctx.lineTo(450, y); ctx.stroke(); });
            
            // Dynamomètre
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 8;
            ctx.beginPath(); ctx.moveTo(dynaX, 0); ctx.lineTo(dynaX, dynaTopY); ctx.stroke();
            ctx.fillStyle = '#eef2f5'; ctx.fillRect(dynaX-30, dynaTopY, 60, dynaHeight);
            
            // Graduations
            ctx.fillStyle = '#000'; ctx.font = 'bold 20px Arial';
            for (let i = 0; i <= maxForceN; i++) {
                let y = zeroY + (i * pixelsPerNewton);
                ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(dynaX, y); ctx.lineTo(dynaX+20, y); ctx.stroke();
                ctx.fillText(i, dynaX+30, y+7);
            }
            ctx.fillStyle = '#e74c3c'; ctx.fillText("N", dynaX+30, zeroY-25);

            let curY = Math.max(zeroY, zeroY + (currentForce * pixelsPerNewton));
            let hY = curY + rodLength;

            // Ressort
            ctx.strokeStyle = '#34495e'; ctx.lineWidth = 2; ctx.beginPath();
            let segs = 24, hSeg = (curY - (dynaTopY+15))/segs;
            ctx.moveTo(dynaX, dynaTopY+15);
            for(let i=1; i<=segs; i++) ctx.lineTo(dynaX+(i%2==0?10:-10), (dynaTopY+15)+i*hSeg);
            ctx.stroke();

            // Tige et Curseur
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(dynaX, curY); ctx.lineTo(dynaX, hY); ctx.stroke();
            ctx.strokeStyle = 'red'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(dynaX-25, curY); ctx.lineTo(dynaX+20, curY); ctx.stroke();
            
            // Tube
            ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fillRect(dynaX-30, dynaTopY, 60, dynaHeight);
            ctx.strokeStyle = '#95a5a6'; ctx.strokeRect(dynaX-30, dynaTopY, 60, dynaHeight);
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(dynaX-32, dynaTopY, 64, 12); ctx.fillRect(dynaX-32, dynaTopY+dynaHeight-12, 64, 12);

            // Crochet
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(dynaX-8, hY, 10, 0, Math.PI); ctx.stroke();

            // Objets
            objects.forEach(o => {
                let m = o.mass >= 1 ? o.mass + " kg" : (o.mass*1000) + " g";
                if (o.type === 'pomme') drawPomme(ctx, o.x, o.y, o.radius, m);
                else if (o.type === 'trousse') drawTrousse(ctx, o.x, o.y, o.radius, m);
                else if (o.type === 'poids') drawPoids(ctx, o.x, o.y, o.radius, m);
                if (!o.isHooked && activeDragObj !== o) {
                    ctx.fillStyle = '#2c3e50'; ctx.font = '12px Arial'; ctx.fillText(o.label, o.x, o.y+o.radius+15);
                }
            });
        }

        function checkA(q, btn, correct, exp) {
            const card = document.getElementById(`q${q}`);
            const buttons = card.querySelectorAll('button');
            const fb = document.getElementById(`fb-q${q}`);
            buttons.forEach(b => b.disabled = true);
            if (correct) { btn.classList.add('correct'); fb.className = 'feedback show success'; fb.innerHTML = `✅ ${exp}`; }
            else { btn.classList.add('incorrect'); fb.className = 'feedback show error'; fb.innerHTML = `❌ ${exp}`;
                buttons.forEach(b => { if(b.getAttribute('onclick').includes('true')) b.style.border = "2px solid green"; });
            }
        }

        // Lancement du moteur de rendu 
        animate();

    </script>
</body>
</html>

        let isDrawing = false; let userStart = null; let userEnd = null; let mouseCurrent = null;
        let animating = false; let animStartTime = null; let currentEase = 1; 

        // --- MOTEUR D'ANIMATION ---
        function startAnimation() {
            animating = true; animStartTime = null;
            canvas.classList.add('disabled'); btnEffacer.disabled = true; btnVerifier.disabled = true;
            document.getElementById(`card-${currentSit.id}`).classList.add('is-animating');
            showFeedback("Observe l'action mécanique en cours...", "info");
            requestAnimationFrame(animLoop);
        }

        function animLoop(timestamp) {
            if (!animStartTime) animStartTime = timestamp;
            let progress = (timestamp - animStartTime) / ANIM_DURATION;
            if (progress > 1) progress = 1;
            currentEase = 1 - Math.pow(1 - progress, 3); // Ease Out
            renderScene();

            if (progress < 1) requestAnimationFrame(animLoop);
            else {
                animating = false; canvas.classList.remove('disabled'); btnEffacer.disabled = false; btnVerifier.disabled = false;
                document.getElementById(`card-${currentSit.id}`).classList.remove('is-animating');
                showFeedback("À toi de jouer ! Trace le vecteur force sur l'image statique.", "info");
            }
        }

        // --- FONCTIONS DE DESSIN ---
        function drawGrid() {
            ctx.strokeStyle = 'var(--grid-color)'; ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += CM_TO_PIXELS) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for (let y = 0; y <= canvas.height; y += CM_TO_PIXELS) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
        }

        function drawUserArrow(startX, startY, endX, endY) {
            const headlen = 15; const angle = Math.atan2(endY - startY, endX - startX);
            ctx.strokeStyle = '#e74c3c'; ctx.fillStyle = '#e74c3c'; ctx.lineWidth = 5; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(endX, endY); ctx.lineTo(endX - headlen * Math.cos(angle - Math.PI / 6), endY - headlen * Math.sin(angle - Math.PI / 6)); ctx.lineTo(endX - headlen * Math.cos(angle + Math.PI / 6), endY - headlen * Math.sin(angle + Math.PI / 6)); ctx.fill();

            if (isDrawing) {
                const distPx = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                const distCm = (distPx / CM_TO_PIXELS).toFixed(1);
                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(endX + 5, endY - 25, 60, 20);
                ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 16px Arial'; ctx.fillText(`${distCm} cm`, endX + 10, endY - 10);
            }
        }

        function drawTargetHint(x, y) {
            if(!animating) { ctx.fillStyle = 'rgba(231, 76, 60, 0.2)'; ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill(); }
        }

        // SCENARIOS
        function drawDynamometer(ease) {
            ctx.save();
            const startPullX = 350; const endPullX = 440; const currentX = startPullX + (endPullX - startPullX) * ease;
            const forceValue = 3 * ease;

            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(100, 180, 15, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(115, 180); ctx.lineTo(160, 180); ctx.stroke();
            ctx.fillStyle = 'rgba(189, 195, 199, 0.5)'; ctx.strokeStyle = '#95a5a6'; ctx.lineWidth = 2;
            ctx.fillRect(160, 150, 200, 60); ctx.strokeRect(160, 150, 200, 60);
            
            ctx.fillStyle = '#333'; ctx.font = '12px Arial';
            for(let i=0; i<=5; i++) { let gx = 180 + i*30; ctx.beginPath(); ctx.moveTo(gx, 150); ctx.lineTo(gx, 160); ctx.stroke(); ctx.fillText(i, gx - 4, 175); }

            const curseurX = 180 + forceValue * 30; 
            ctx.strokeStyle = '#34495e'; ctx.beginPath(); ctx.moveTo(160, 180);
            for(let i=0; i<10; i++) { ctx.lineTo(160 + (curseurX-160)*(i/10), 180 + (i%2===0?10:-10)); }
            ctx.lineTo(curseurX, 180); ctx.stroke();
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(curseurX - 2, 150, 4, 60);
            
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(curseurX, 180); ctx.lineTo(currentX, 180); ctx.stroke();
            ctx.beginPath(); ctx.arc(currentX, 180, 10, -Math.PI/2, Math.PI/2); ctx.stroke(); 

            ctx.fillStyle = '#f1c27d'; ctx.beginPath(); ctx.arc(currentX + 20, 180, 20, 0, Math.PI*2); ctx.fill(); 
            ctx.beginPath(); ctx.arc(currentX + 5, 170, 8, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(currentX + 5, 190, 8, 0, Math.PI*2); ctx.fill(); 
            ctx.fillRect(currentX + 20, 160, 40, 40); 
            ctx.restore();
            drawTargetHint(currentSit.targetOrigin[0], currentSit.targetOrigin[1]);
        }

        function drawWeight(ease) {
            ctx.save();
            let bounce = Math.sin(ease * Math.PI * 4) * (1-ease) * 15;
            const currentY = 100 + (200 - 100) * ease + bounce;

            ctx.fillStyle = '#95a5a6'; ctx.fillRect(200, 0, 200, 20);
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(300, 20); ctx.lineTo(300, currentY - 40); ctx.stroke();
            ctx.fillStyle = '#34495e'; ctx.beginPath(); ctx.arc(300, currentY, 40, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.arc(285, currentY - 15, 10, 0, Math.PI*2); ctx.fill();
            
            drawTargetHint(currentSit.targetOrigin[0], currentSit.targetOrigin[1]);
            if(!animating) { ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(290, 200); ctx.lineTo(310, 200); ctx.stroke(); ctx.beginPath(); ctx.moveTo(300, 190); ctx.lineTo(300, 210); ctx.stroke(); }
            ctx.restore();
        }

        function drawCart(ease) {
            ctx.save();
            const currentX = 100 + (220 - 100) * ease; 
            
            ctx.fillStyle = '#bdc3c7'; ctx.fillRect(0, 300, 600, 60);
            ctx.fillStyle = '#e67e22'; ctx.fillRect(currentX, 200, 160, 80);
            ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(currentX + 30, 290, 20, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(currentX + 130, 290, 20, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = '#d35400'; ctx.lineWidth = 4; ctx.strokeRect(currentX, 200, 160, 80);

            ctx.translate(currentX - 60, 290); 
            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 12; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20, -40); ctx.stroke(); 
            let legWalk = Math.sin(ease * Math.PI * 6) * 15;
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-15 + legWalk, 30); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(15 - legWalk, 30); ctx.stroke(); 
            ctx.fillStyle = '#f1c27d'; ctx.beginPath(); ctx.arc(-15, -55, 12, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = '#f1c27d'; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(-20, -35); ctx.lineTo(60, -30); ctx.stroke(); 
            ctx.restore();
            drawTargetHint(currentSit.targetOrigin[0], currentSit.targetOrigin[1]);
        }

        // --- SCÉNARIO 4 : PLAN INCLINÉ (GÉOMÉTRIE PARFAITE) ---
        function drawInclinedPlane(ease) {
            ctx.save();
            
            const slopeAngle = -25 * Math.PI / 180; // Angle de la pente
            const dynaR = 45; // Rayon du dynamomètre
            
            // 1. Décor statique
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(30, 320); ctx.lineTo(550, 320); ctx.stroke(); // Sol
            
            // On bascule le repère pour dessiner toute la pente facilement
            ctx.save();
            ctx.translate(50, 320); 
            ctx.rotate(slopeAngle);
            
            // Ligne de la pente
            ctx.strokeStyle = '#34495e'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(480, 0); ctx.stroke();
            
            // Animation : La voiture démarre en haut (260) et descend à (150)
            let d = 260 - 110 * ease; 
            
            // Coordonnées Locales de l'attache de la voiture et du dynamomètre
            const carHookLocalX = d + 80;
            const carHookLocalY = -20;
            const dynaHookLocalX = 420;
            const dynaHookLocalY = -20; // Même hauteur Y pour que le fil soit 100% parallèle
            
            // Fil tendu
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(carHookLocalX, carHookLocalY); ctx.lineTo(dynaHookLocalX, dynaHookLocalY); ctx.stroke(); 
            
            // Voiturette Sport Rouge posée sur la pente
            ctx.translate(d, 0);
            ctx.fillStyle = '#2c3e50'; 
            ctx.beginPath(); ctx.arc(20, -10, 10, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(60, -10, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#bdc3c7'; 
            ctx.beginPath(); ctx.arc(20, -10, 4, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(60, -10, 4, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#e74c3c'; 
            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, -40); ctx.lineTo(20, -40); ctx.lineTo(35, -55); ctx.lineTo(65, -55); ctx.lineTo(80, -40); ctx.lineTo(80, -20); ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.fillStyle = '#ecf0f1'; 
            ctx.beginPath(); ctx.moveTo(25, -40); ctx.lineTo(37, -51); ctx.lineTo(50, -51); ctx.lineTo(50, -40); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(54, -40); ctx.lineTo(54, -51); ctx.lineTo(62, -51); ctx.lineTo(72, -40); ctx.closePath(); ctx.fill();
            
            ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(80, -20, 4, 0, Math.PI*2); ctx.fill(); // Le Crochet
            ctx.restore(); // Retour au repère global (non incliné)
            
            // 2. Calcul du Dynamomètre dans le repère global
            let dX_global = 50 + dynaHookLocalX * Math.cos(slopeAngle) - dynaHookLocalY * Math.sin(slopeAngle);
            let dY_global = 320 + dynaHookLocalX * Math.sin(slopeAngle) + dynaHookLocalY * Math.cos(slopeAngle);
            
            let dynaX = dX_global;
            let dynaY = dY_global - dynaR; // Le cadran est au-dessus du crochet
            
            // Poteau vertical
            ctx.lineWidth = 8; ctx.strokeStyle = '#7f8c8d';
            ctx.beginPath(); ctx.moveTo(dynaX, dynaY); ctx.lineTo(dynaX, 320); ctx.stroke(); 
            
            // Attache du fil
            ctx.fillStyle = '#333'; ctx.beginPath(); ctx.arc(dX_global, dY_global, 5, 0, Math.PI*2); ctx.fill();
            
            // 3. Cadran du Dynamomètre (LISIBLE ET PARFAITEMENT CLAIR)
            let dynaGradient = ctx.createRadialGradient(dynaX, dynaY, 5, dynaX, dynaY, dynaR);
            dynaGradient.addColorStop(0, '#ecf0f1'); dynaGradient.addColorStop(0.8, '#bdc3c7'); dynaGradient.addColorStop(1, '#7f8c8d');
            ctx.fillStyle = dynaGradient; ctx.beginPath(); ctx.arc(dynaX, dynaY, dynaR, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 3; ctx.stroke();
            
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(dynaX, dynaY, dynaR - 8, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1; ctx.stroke();
            
            ctx.save();
            ctx.translate(dynaX, dynaY);
            ctx.fillStyle = '#000'; ctx.font = 'bold 16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
            
            // Graduations de 0 à 4 N (Moitié supérieure du cadran)
            for(let i=0; i<=4; i++) {
                let angle = Math.PI + (i / 4) * Math.PI; // Tourne de gauche (180°) à droite (0°)
                ctx.save(); ctx.rotate(angle);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(dynaR-8, 0); ctx.lineTo(dynaR - 16, 0); ctx.stroke();
                ctx.restore();
                
                // Dessiner les numéros
                let nx = (dynaR - 26) * Math.cos(angle);
                let ny = (dynaR - 26) * Math.sin(angle);
                ctx.fillText(i, nx, ny);
            }
            
            // Petites graduations intermédiaires (0.5 N)
            for(let i=0.5; i<4; i+=1) {
                let angle = Math.PI + (i / 4) * Math.PI;
                ctx.save(); ctx.rotate(angle);
                ctx.strokeStyle = '#666'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(dynaR-8, 0); ctx.lineTo(dynaR - 12, 0); ctx.stroke();
                ctx.restore();
            }
            
            ctx.fillStyle = '#c0392b'; ctx.font = 'bold 12px Arial'; ctx.fillText("N", 0, 10);
            
            // Aiguille
            let forceVal = 2 * ease; // La force monte jusqu'à 2 N !
            let needleAngle = Math.PI + (forceVal / 4) * Math.PI; // Aiguille pointera exactement au milieu (en haut)
            
            ctx.rotate(needleAngle);
            ctx.fillStyle = '#e74c3c'; 
            ctx.beginPath(); ctx.moveTo(0, -3); ctx.lineTo(0, 3); ctx.lineTo(dynaR-12, 0); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.arc(0,0, 4, 0, Math.PI*2); ctx.fill(); 
            ctx.restore();

            drawTargetHint(currentSit.targetOrigin[0], currentSit.targetOrigin[1]);
            ctx.restore();
        }

        // --- RENDER & SOURIS ---
        function renderScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            currentSit.drawScenery(currentEase);

            if (!animating && userStart && (userEnd || mouseCurrent)) {
                let end = isDrawing ? mouseCurrent : userEnd;
                drawUserArrow(userStart.x, userStart.y, end.x, end.y);
            }
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            // Prise en compte du redimensionnement (scale)
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { 
                x: (evt.clientX - rect.left) * scaleX, 
                y: (evt.clientY - rect.top) * scaleY 
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (animating) return;
            isDrawing = true; userStart = getMousePos(e); userEnd = null;
            feedbackBox.className = 'feedback-box info'; feedbackBox.innerText = 'Étire la flèche pour donner la bonne longueur...';
            renderScene();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            mouseCurrent = getMousePos(e); renderScene();
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false; userEnd = getMousePos(e); mouseCurrent = null;
            const dist = Math.sqrt(Math.pow(userEnd.x - userStart.x, 2) + Math.pow(userEnd.y - userStart.y, 2));
            if (dist < 15) { userStart = null; userEnd = null; renderScene(); return; }
            renderScene();
            feedbackBox.innerText = 'Clique sur "Vérifier ma réponse".';
        });

        canvas.addEventListener('mouseleave', () => {
            if(isDrawing) { isDrawing = false; userStart = null; userEnd = null; mouseCurrent = null; renderScene(); showFeedback("Tu as relâché hors du cadre.", "info"); }
        });

        // --- Événements Tactiles (iPad / Tablette) ---
        function getTouchPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const touch = evt.touches[0] || evt.changedTouches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return { 
                x: (touch.clientX - rect.left) * scaleX, 
                y: (touch.clientY - rect.top) * scaleY 
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            if (animating) return;
            e.preventDefault(); // Bloque le défilement de la page
            isDrawing = true; userStart = getTouchPos(e); userEnd = null;
            feedbackBox.className = 'feedback-box info'; feedbackBox.innerText = 'Étire la flèche pour donner la bonne longueur...';
            renderScene();
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            e.preventDefault(); // Bloque le défilement de la page
            mouseCurrent = getTouchPos(e); renderScene();
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            isDrawing = false; userEnd = getTouchPos(e); mouseCurrent = null;
            const dist = Math.sqrt(Math.pow(userEnd.x - userStart.x, 2) + Math.pow(userEnd.y - userStart.y, 2));
            if (dist < 15) { userStart = null; userEnd = null; renderScene(); return; }
            renderScene();
            feedbackBox.innerText = 'Clique sur "Vérifier ma réponse".';
        });

        canvas.addEventListener('touchcancel', (e) => {
            if(isDrawing) { isDrawing = false; userStart = null; userEnd = null; mouseCurrent = null; renderScene(); showFeedback("Tu as relâché hors du cadre.", "info"); }
        });

        // --- LOGIQUE DE VALIDATION ---
        function checkAnswer() {
            if (!userStart || !userEnd) { showFeedback("Trace d'abord un vecteur sur l'image !", "error"); return; }
            const tOrig = currentSit.targetOrigin; const tAngle = currentSit.targetAngle; const tLenCm = currentSit.targetLengthCm;

            const distOrigin = Math.sqrt(Math.pow(userStart.x - tOrig[0], 2) + Math.pow(userStart.y - tOrig[1], 2));
            if (distOrigin > 30) { showFeedback("❌ Le point d'application est mal placé.", "error"); return; }

            const dx = userEnd.x - userStart.x; const dy = userEnd.y - userStart.y;
            let userAngle = Math.atan2(dy, dx) * (180 / Math.PI); if (userAngle < 0) userAngle += 360; 
            
            let tAngleNorm = tAngle < 0 ? tAngle + 360 : tAngle;
            let angleDiff = Math.abs(userAngle - tAngleNorm);
            if (angleDiff > 180) angleDiff = 360 - angleDiff;

            if (angleDiff > 15) {
                if (angleDiff > 150) showFeedback("❌ Le SENS de la flèche est inversé !", "error");
                else showFeedback("❌ La direction (l'inclinaison) de la flèche n'est pas bonne.", "error");
                return;
            }

            const userLenCm = Math.sqrt(dx*dx + dy*dy) / CM_TO_PIXELS;
            if (Math.abs(userLenCm - tLenCm) > 0.3) {
                showFeedback(`❌ La longueur est fausse. Tu as tracé ${userLenCm.toFixed(1)} cm. Fais bien le calcul avec l'échelle !`, "error");
                return;
            }

            showFeedback(`✅ Excellent ! Ton vecteur possède les 4 bonnes caractéristiques (Origine, Direction, Sens, et Longueur exacte de ${tLenCm} cm).`, "success");
        }

        function showFeedback(msg, type) { feedbackBox.className = `feedback-box ${type}`; feedbackBox.innerHTML = msg; }
        function clearVector() { userStart = null; userEnd = null; mouseCurrent = null; showFeedback("Vecteur effacé. Trace à nouveau.", "info"); renderScene(); }
        function loadSituation(index) {
            if(animating) return;
            currentSit = situations[index]; userStart = null; userEnd = null; mouseCurrent = null;
            document.querySelectorAll('.situation-card').forEach((el, i) => { if (i === index) el.classList.add('active'); else el.classList.remove('active'); });
            startAnimation();
        }

        window.onload = () => { startAnimation(); };
    </script>
