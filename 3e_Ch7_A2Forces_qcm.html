<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Évaluation : Actions et Forces (3ème)</title>
    <style>
        :root { --primary: #2c3e50; --accent-blue: #3498db; --accent-green: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--primary); -webkit-tap-highlight-color: transparent; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); border-bottom: 3px solid var(--accent-blue); padding-bottom: 10px; display: inline-block; font-size: 1.5rem;}
        
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .student-info { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .student-info input { flex: 1; min-width: 150px; padding: 12px; font-size: 1rem; border: 2px solid #ddd; border-radius: 8px; }
        
        .question-block { margin-bottom: 25px; padding: 15px; background: #f8f9fa; border-radius: 8px; border-left: 5px solid var(--accent-blue); }
        .question-text { font-weight: bold; font-size: 1.1rem; margin-top: 0; }
        
        .question-image { width: 100%; max-width: 250px; height: 150px; margin: 15px 0; background: white; border-radius: 6px; border: 1px solid #ddd; padding: 10px; display: flex; justify-content: center; align-items: center; }
        .question-image svg { width: 100%; height: 100%; }
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-label { display: flex; align-items: center; background: white; padding: 12px 15px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .option-label:hover { background: #eef2f5; }
        .option-label input { margin-right: 15px; transform: scale(1.5); }
        
        .btn-submit { display: block; width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; background: var(--accent-green); color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        .btn-submit:disabled { background: #95a5a6; cursor: not-allowed; }
        
        #resultScreen { display: none; text-align: center; padding: 20px; background: #e8f8f5; border: 2px solid var(--accent-green); border-radius: 8px; margin-top: 20px; }
        #resultScreen h2 { color: var(--accent-green); font-size: 2rem; margin: 0; }
        .loader { display: none; text-align: center; font-weight: bold; color: var(--accent-blue); margin-top: 15px; }
        
        .rappel { font-weight: normal; font-size: 0.95rem; color: #d35400; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<header>
    <h1>Évaluation : Actions et Forces</h1>
</header>

<div class="container">
    <div class="student-info">
        <input type="text" id="nomInput" placeholder="Ton NOM" required>
        <input type="text" id="prenomInput" placeholder="Ton Prénom" required>
        <input type="text" id="classeInput" placeholder="Ta Classe (ex: 3A)" required>
    </div>

    <form id="quizForm">
        <div id="questionsContainer"></div>
        <button type="button" class="btn-submit" id="submitBtn" onclick="submitQuiz()">Envoyer ma copie</button>
        <div class="loader" id="loader">Envoi en cours... Veuillez patienter ⏳</div>
    </form>

    <div id="resultScreen">
        <h2>Note : <span id="scoreDisplay"></span> / 10</h2>
        <p>Ta copie a bien été enregistrée.</p>
    </div>
</div>

<script>
    // URL Google Apps Script mise à jour
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwvMSNQZTUF7xSOVi6aDsX6qyxIyVJLR6a4-swXyfMjVG-oCgCJwuQjIemg287uy9x/exec";

    // Schémas au format SVG
    const svgPoids = `<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="130" width="200" height="20" fill="#95a5a6"/><circle cx="100" cy="60" r="30" fill="#3498db"/><line x1="100" y1="60" x2="100" y2="120" stroke="red" stroke-width="4"/><polygon points="95,110 105,110 100,125" fill="red"/></svg>`;
    const svgPoussee = `<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="130" width="200" height="20" fill="#95a5a6"/><rect x="40" y="70" width="60" height="60" fill="#f39c12"/><line x1="100" y1="100" x2="160" y2="100" stroke="red" stroke-width="4"/><polygon points="150,95 150,105 165,100" fill="red"/></svg>`;
    const svgTraction = `<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="130" width="200" height="20" fill="#95a5a6"/><rect x="80" y="70" width="60" height="60" fill="#8e44ad"/><line x1="140" y1="70" x2="180" y2="30" stroke="red" stroke-width="4"/><polygon points="170,35 178,42 185,25" fill="red"/></svg>`;
    const svgDyna = `<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg"><rect x="90" y="20" width="20" height="80" fill="#bdc3c7" stroke="#2c3e50"/><line x1="100" y1="100" x2="100" y2="130" stroke="#7f8c8d" stroke-width="3"/><circle cx="100" cy="140" r="10" fill="#27ae60"/></svg>`;
    const svgTirCorde = `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg"><line x1="40" y1="50" x2="160" y2="50" stroke="#333" stroke-width="4"/><circle cx="40" cy="40" r="15" fill="#3498db"/><circle cx="160" cy="40" r="15" fill="#e67e22"/><line x1="80" y1="50" x2="130" y2="50" stroke="#e74c3c" stroke-width="4"/><polygon points="125,45 125,55 135,50" fill="#e74c3c"/></svg>`;
    const svgChien = `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg"><circle cx="40" cy="60" r="20" fill="#e67e22"/><circle cx="160" cy="40" r="15" fill="#8e44ad"/><line x1="60" y1="60" x2="150" y2="40" stroke="#333" stroke-width="2"/><line x1="100" y1="50" x2="140" y2="40" stroke="#e74c3c" stroke-width="4"/><polygon points="135,35 138,47 148,38" fill="#e74c3c"/></svg>`;
    const svgPerceuse = `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg"><g transform="translate(100,50) rotate(30)"><rect x="-30" y="-15" width="60" height="30" rx="5" fill="#7f8c8d"/><rect x="-10" y="15" width="20" height="40" rx="3" fill="#2c3e50"/><line x1="30" y1="0" x2="70" y2="0" stroke="#e74c3c" stroke-width="4"/><polygon points="65,-5 65,5 75,0" fill="#e74c3c"/></g></svg>`;
    const svgCommode = `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="80" width="200" height="20" fill="#bdc3c7"/><rect x="80" y="30" width="50" height="50" fill="#8e44ad"/><circle cx="50" cy="50" r="12" fill="#3498db"/><line x1="50" y1="62" x2="50" y2="80" stroke="#3498db" stroke-width="4"/><line x1="50" y1="62" x2="80" y2="55" stroke="#3498db" stroke-width="4"/><circle cx="80" cy="55" r="5" fill="#e74c3c"/></svg>`;
    const svgPerche = `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg"><path d="M 50 90 Q 100 10 150 90" fill="transparent" stroke="#f1c40f" stroke-width="5"/><circle cx="100" cy="50" r="12" fill="#2c3e50"/><line x1="100" y1="50" x2="100" y2="85" stroke="#e74c3c" stroke-width="4"/><polygon points="95,80 105,80 100,90" fill="#e74c3c"/></svg>`;
    const svgFoot = `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="80" width="200" height="20" fill="#27ae60"/><circle cx="120" cy="70" r="10" fill="white" stroke="#333" stroke-width="2"/><line x1="70" y1="30" x2="70" y2="60" stroke="#2980b9" stroke-width="6" stroke-linecap="round"/><line x1="70" y1="60" x2="110" y2="70" stroke="#2980b9" stroke-width="6" stroke-linecap="round"/><circle cx="110" cy="70" r="4" fill="#e74c3c"/></svg>`;
    const svgTennis = `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg"><circle cx="140" cy="40" r="8" fill="#f1c40f"/><line x1="50" y1="80" x2="80" y2="50" stroke="#2c3e50" stroke-width="4"/><ellipse cx="100" cy="35" rx="25" ry="15" fill="transparent" stroke="#2c3e50" stroke-width="4" transform="rotate(-30 100 35)"/><line x1="110" y1="35" x2="140" y2="40" stroke="#e74c3c" stroke-width="4"/><polygon points="135,35 135,45 145,40" fill="#e74c3c"/></svg>`;

    const rappelPoids = "<span class='rappel'>💡 Rappel : Le poids est la force d'attraction gravitationnelle qu'exerce la Terre (ou un autre astre) sur un objet.</span>";

    // Base de données des questions
    const allQuestions = [
        { q: "Quel est l'effet d'une force sur un ballon immobile ?", o: ["Elle le met en mouvement", "Elle l'arrête", "Elle modifie sa couleur"], a: 0 },
        { q: "Lorsqu'un tennisman frappe une balle en vol, la force permet de :", img: svgTennis, o: ["Mettre la balle au repos", "Modifier sa trajectoire et sa vitesse", "Déformer définitivement la raquette"], a: 1 },
        { q: "Dans le saut à la perche, quel est l'effet principal de la force exercée par l'athlète sur la perche ?", img: svgPerche, o: ["La mise en mouvement de la perche", "La déformation de la perche", "L'arrêt de l'athlète"], a: 1 },
        { q: "Une action mécanique peut-elle avoir pour effet de déformer un objet ?", o: ["Oui", "Non", "Seulement dans l'espace"], a: 0 },
        { q: "Quel effet n'est PAS causé par une action mécanique ?", o: ["Changer la trajectoire", "Modifier la température", "Déformer l'objet"], a: 1 },
        { q: "Un aimant attire une bille en fer. Quel est l'effet de cette action ?", o: ["Déformation", "Mise en mouvement", "Échauffement"], a: 1 },
        { q: "Laquelle de ces propositions décrit un changement de trajectoire ?", o: ["Démarrer une voiture", "Tourner le volant de la voiture", "Freiner la voiture"], a: 1 },
        { q: "L'action du vent sur les voiles d'un bateau permet de :", o: ["Le déformer uniquement", "Le mettre en mouvement", "Le refroidir"], a: 1 },
        { q: "Si on appuie fort sur un ressort, on observe :", o: ["Une déformation temporaire", "Une modification de trajectoire", "Aucun effet visible"], a: 0 },
        { q: "L'unité de la force est le :", o: ["Kilogramme", "Newton", "Mètre"], a: 1 },
        { q: "Quel est le symbole du Newton ?", o: ["N", "n", "Nw"], a: 0 },
        { q: "Une force se mesure avec :", o: ["Une balance", "Un thermomètre", "Un dynamomètre"], a: 2 },
        { q: "Quel est cet appareil de mesure ?", img: svgDyna, o: ["Un thermomètre", "Une balance", "Un dynamomètre"], a: 2 },
        { q: "Quelle grandeur physique le dynamomètre mesure-t-il ?" + rappelPoids, o: ["La masse de l'objet", "Le poids (qui est une force)", "Le volume de l'objet"], a: 1 },
        { q: "La balance sert à mesurer :" + rappelPoids, o: ["Le poids", "La force", "La masse"], a: 2 },
        { q: "Sur l'animation du dynamomètre, si j'accroche 0.5 kg, je lis environ :", o: ["0.5 N", "5 N", "50 N"], a: 1 },
        { q: "La masse se mesure en :", o: ["Kilogramme (kg)", "Newton (N)", "Litre (L)"], a: 0 },
        { q: "Pour mesurer la force de poussée d'une main, on utilise :", o: ["Un dynamomètre", "Une balance", "Une règle"], a: 0 },
        { q: "Si la force est plus grande, le ressort du dynamomètre :", o: ["S'étire moins", "S'étire davantage", "Ne bouge pas"], a: 1 },
        { q: "Sur ce schéma, la flèche rouge part du centre de l'objet vers le bas. Quelle force est représentée ?" + rappelPoids, img: svgPoids, o: ["Une force de poussée", "Le Poids (attraction terrestre)", "La force du sol"], a: 1 },
        { q: "D'après ce schéma, quelle est la direction de la force ?", img: svgPoussee, o: ["Verticale", "Horizontale", "Oblique"], a: 1 },
        { q: "Sur ce schéma, quel est le sens de la force ?", img: svgTraction, o: ["Vers le bas et la gauche", "Vers le haut et la droite", "Horizontal"], a: 1 },
        { q: "Pour décrire complètement une force, il faut connaître :", o: ["Sa taille et sa couleur", "Son point d'application, sa direction, son sens, son intensité", "Sa direction, sa vitesse et sa masse"], a: 1 },
        { q: "Le 'point d'application' d'une force de contact est :", o: ["Le centre de l'objet", "Le point de contact entre les deux objets", "Le sol"], a: 1 },
        { q: "La 'direction' d'une force, c'est :", o: ["La droite d'action (horizontale, verticale, oblique...)", "Vers la gauche ou vers la droite", "La valeur en Newton"], a: 0 },
        { q: "Le 'sens' d'une force, c'est :", o: ["Horizontal ou vertical", "Vers le haut, le bas, la droite, la gauche", "La longueur de la flèche"], a: 1 },
        { q: "L'intensité d'une force est :", o: ["Sa valeur en Newton", "La droite sur laquelle elle agit", "Le lieu où elle s'exerce"], a: 0 },
        { q: "Si un objet est tiré par une corde vers le haut, la direction est :", o: ["Verticale", "Vers le haut", "Le nœud de la corde"], a: 0 },
        { q: "Un chien tire sur sa laisse. La force exercée par la laisse SUR le chien a pour point d'application :", img: svgChien, o: ["La main de la maîtresse", "Le collier du chien", "Le centre du chien"], a: 1 },
        { q: "Quel outil mathématique utilise-t-on pour représenter une force sur un schéma ?", o: ["Une courbe", "Un vecteur force (une flèche)", "Un cercle"], a: 1 },
        { q: "Sur un vecteur force, l'origine de la flèche correspond :", o: ["Au sens", "Au point d'application", "À l'intensité"], a: 1 },
        { q: "La longueur de la flèche est proportionnelle à :", o: ["La masse de l'objet", "L'intensité de la force", "La direction de la force"], a: 1 },
        { q: "Si 1 cm représente 10 N. Quelle sera la longueur d'une flèche pour une force de 40 N ?", o: ["4 cm", "10 cm", "40 cm"], a: 0 },
        { q: "L'inclinaison de la flèche sur le dessin représente :", o: ["Le point d'application", "La direction", "L'intensité"], a: 1 },
        { q: "Si je dessine une force avec une flèche plus longue, cela signifie que la force est :", o: ["Moins intense", "Plus intense", "Plus rapide"], a: 1 },
        { q: "On souhaite représenter une force horizontale, vers la droite, de 20N (Echelle: 1cm = 5N). La flèche fera :", o: ["4 cm", "20 cm", "5 cm"], a: 0 },
        { q: "Sur le plan incliné, la direction du fil qui retient la voiturette est :", o: ["Horizontale", "Verticale", "Oblique (parallèle au plan)"], a: 2 },
        { q: "La pointe de la flèche indique :", o: ["Le sens", "La direction", "L'intensité"], a: 0 },
        { q: "Si l'échelle est 1 cm = 2 N, une flèche de 3 cm représente une force de :", o: ["3 N", "6 N", "1.5 N"], a: 1 },
        { q: "Sur Terre, le poids d'un objet est environ :" + rappelPoids, o: ["10 fois plus petit que sa masse en kg", "10 fois plus grand que sa masse en kg", "Égal à sa masse"], a: 1 },
        { q: "Si un sac de riz a une masse de 3 kg, son poids sur Terre est environ :" + rappelPoids, o: ["3 N", "30 N", "300 N"], a: 1 },
        { q: "La formule reliant le Poids (P) et la masse (m) sur Terre est :" + rappelPoids, o: ["P = m ÷ 10", "P = m + 10", "P = m × 10"], a: 2 },
        { q: "Si le dynamomètre affiche 20 N, quelle est la masse de l'objet accroché ?", o: ["2 kg", "20 kg", "200 kg"], a: 0 },
        { q: "Le poids est une action :" + rappelPoids, o: ["De contact", "À distance", "Magnétique"], a: 1 },
        { q: "La direction du poids (attraction terrestre) est toujours :" + rappelPoids, o: ["Horizontale", "Verticale", "Oblique"], a: 1 },
        { q: "Le sens du poids est toujours :" + rappelPoids, o: ["Vers le haut", "Vers le centre de la Terre (le bas)", "Vers le nord"], a: 1 },
        { q: "Ma masse sur la Lune est-elle la même que sur la Terre ?", o: ["Oui", "Non, elle est plus faible", "Non, elle est plus forte"], a: 0 },
        { q: "Mon poids sur la Lune est-il le même que sur la Terre ?" + rappelPoids, o: ["Oui", "Non, car l'attraction est différente", "Non, car l'air est différent"], a: 1 },
        { q: "Une masse de 100g (0,1 kg) accrochée au dynamomètre affiche un poids de :" + rappelPoids, o: ["1 N", "10 N", "100 N"], a: 0 },
        { q: "Dans le tir à la corde, la force modélisée vers la fille est celle exercée :", img: svgTirCorde, o: ["Par la fille sur le garçon", "Par la corde sur le garçon", "Par le garçon sur la fille"], a: 1 },
        { q: "La perceuse tenue par un ouvrier de travers exerce une force dont la direction est :", img: svgPerceuse, o: ["Verticale", "Oblique", "Horizontale"], a: 1 },
        { q: "Si je pousse une commode par la gauche pour la déplacer vers la droite, le point d'application est :", img: svgCommode, o: ["À gauche de la commode", "Au centre de la commode", "À droite de la commode"], a: 0 },
        { q: "La flèche du Poids d'une balle de tennis en chute libre démarre :" + rappelPoids, o: ["Du bord inférieur de la balle", "Du centre de la balle", "De la raquette"], a: 1 },
        { q: "Si un dynamomètre indique 4N avec une échelle de 1cm = 2N, le vecteur tracé mesurera :", o: ["2 cm", "4 cm", "8 cm"], a: 0 },
        { q: "Une action mécanique s'exerce entre un acteur (qui agit) et :", o: ["Un moteur", "Un receveur (qui subit)", "Un vecteur"], a: 1 },
        { q: "Dans la situation du footballeur, l'acteur de la force de frappe est :", img: svgFoot, o: ["Le ballon", "Le pied du joueur", "Le gazon"], a: 1 },
        { q: "L'aimant qui attire un clou est un exemple d'action :", o: ["De contact", "À distance", "Musculaire"], a: 1 },
        { q: "Le vent soufflant sur les branches d'un arbre est une action :", o: ["À distance", "De contact (répartie sur la surface)", "Électrique"], a: 1 },
        { q: "Dans l'animation, la force de la main sur le dynamomètre tire vers :", o: ["Le haut", "Le bas", "La droite"], a: 2 }
    ];

    let selectedQuestions = [];

    function initQuiz() {
        const shuffled = allQuestions.sort(() => 0.5 - Math.random());
        selectedQuestions = shuffled.slice(0, 10);
        
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';

        selectedQuestions.forEach((q, index) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            
            let html = `<p class="question-text">Question ${index + 1}/10 : ${q.q}</p>`;
            
            if (q.img) {
                html += `<div class="question-image">${q.img}</div>`;
            }

            html += `<div class="options">`;
            
            q.o.forEach((optText, optIndex) => {
                html += `
                    <label class="option-label">
                        <input type="radio" name="q${index}" value="${optIndex}" required>
                        ${optText}
                    </label>
                `;
            });
            html += `</div>`;
            block.innerHTML = html;
            container.appendChild(block);
        });
    }

    function submitQuiz() {
        const nom = document.getElementById('nomInput').value.trim();
        const prenom = document.getElementById('prenomInput').value.trim();
        const classe = document.getElementById('classeInput').value.trim();
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');

        if (!nom || !prenom || !classe) {
            alert("Merci de renseigner ton nom, ton prénom et ta classe !");
            return;
        }

        let score = 0;
        for (let i = 0; i < 10; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) {
                alert(`Tu n'as pas répondu à la question ${i + 1} !`);
                return;
            }
            if (parseInt(selected.value) === selectedQuestions[i].a) {
                score++;
            }
        }

        btn.disabled = true;
        loader.style.display = "block";

        const payload = {
            nom: nom.toUpperCase(),
            prenom: prenom,
            classe: classe.toUpperCase(),
            score: score
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            document.getElementById('quizForm').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = score;
        }).catch(err => {
            alert("Une erreur est survenue lors de l'envoi. Appelle ton professeur.");
            btn.disabled = false;
            loader.style.display = "none";
        });
    }

    window.onload = initQuiz;
</script>

</body>
</html>
