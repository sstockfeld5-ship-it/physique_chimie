<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Convertisseur Pédagogique - Masses et Volumes</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: -2px; z-index: 2; }
        .tab-btn { padding: 12px 25px; border: none; background: #dee2e6; cursor: pointer; border-radius: 10px 10px 0 0; font-weight: bold; font-size: 1.1rem; color: #495057; transition: 0.2s; }
        .tab-btn.active { background: white; color: #007bff; border: 2px solid #343a40; border-bottom: none; }

        .app-container { background: white; padding: 25px; border-radius: 0 15px 15px 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 1150px; border: 2px solid #343a40; position: relative; }
        
        .setup-zone { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        input, select, button { padding: 10px; font-size: 1rem; border: 2px solid #dee2e6; border-radius: 8px; outline: none; }
        
        input[type="text"] { background-color: #fff; cursor: pointer; text-align: center; font-weight: bold; }
        input[type="text"]:focus { border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.5); }

        optgroup { font-style: normal; font-weight: bold; color: #000; background: #eee; }

        .btn-action { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; min-width: 220px; transition: 0.2s; }
        .btn-action:hover { background: #0056b3; }
        .btn-action:disabled { background: #6c757d; cursor: not-allowed; }

        .main-layout { display: flex; gap: 20px; align-items: flex-start; }
        .left-panel { flex: 1; }
        .right-panel { width: 320px; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; padding: 15px; min-height: 400px; }

        .instruction { font-size: 1.1rem; color: #495057; font-weight: 500; border-left: 5px solid #007bff; padding-left: 15px; margin: 0 0 15px 0; text-align: left; }
        
        .results-title { margin-top: 0; text-align: center; color: #2c3e50; border-bottom: 2px solid #bdc3c7; padding-bottom: 10px; font-size: 1.2rem; }
        .results-container { display: flex; flex-direction: column; gap: 10px; }
        .result-item { background: #27ae60; color: white; padding: 10px 15px; border-radius: 6px; font-size: 1.1rem; text-align: left; box-shadow: 0 2px 6px rgba(39, 174, 96, 0.3); animation: slideIn 0.3s ease-out forwards; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .table-wrapper { position: relative; }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; background: white; border: 2px solid #343a40; }
        th, td { border: 1px solid #666; height: 60px; text-align: center; font-size: 1.8rem; font-weight: bold; position: relative; }
        th { background: #343a40; color: white; font-size: 0.9rem; height: 40px; }
        
        .bg-yellow { background-color: #fcf3cf !important; color: #000; font-size: 1.2rem; border-bottom: 2px solid #000; }
        .bg-blue-light { background-color: #e0f7fa !important; color: #0056b3; font-size: 1rem; }
        .bg-green-light { background-color: #d1f2eb !important; color: #0056b3; font-size: 1rem; }
        .highlight-l { background-color: #e8f8f5 !important; border: 2px solid #1abc9c !important; font-weight: bold; color: #16a085; font-size: 1.1rem; }
        
        .border-bottom-green { border-bottom: 2px solid #1abc9c !important; }
        .border-left-green { border-left: 2px solid #1abc9c !important; }
        .border-right-green { border-right: 2px solid #1abc9c !important; }

        .virgule-mobile { position: absolute; color: #dc3545; font-size: 2.8rem; font-weight: bold; z-index: 1000; pointer-events: none; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); display: none; }

        .chiffre-unite { color: #fd7e14; text-decoration: underline; font-weight: 900; }
        .zero-ajoute { color: #dc3545; }
        .zero-cliquable { cursor: pointer; transition: 0.3s; }
        .zero-cliquable:hover { color: #dc3545; background-color: #fff5f5; border-radius: 50%; }

        .ligne-active { background-color: #fff9db; }
        .ligne-terminee { background-color: #f8f9fa; color: #adb5bd; }
        
        .hidden { display: none !important; }

        /* --- PAVE NUMERIQUE --- */
        .numpad { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: #fff; border: 2px solid #343a40; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 15px; display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; z-index: 2000; }
        .numpad button { height: 60px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; background: #f8f9fa; color: #343a40; cursor: pointer; transition: 0.1s; }
        .numpad button:active { background: #dee2e6; transform: scale(0.95); }
        .numpad .btn-del { background: #e74c3c; color: white; }
        .numpad .btn-ok { grid-column: span 3; background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('masse')">⚖️ Masses</button>
        <button class="tab-btn" onclick="switchTab('volume')">🧊 Volumes & Capacités</button>
    </div>

    <!-- PAVE NUMERIQUE FLOTTANT -->
    <div id="numpad" class="numpad hidden">
        <button onclick="typeNum('1')">1</button>
        <button onclick="typeNum('2')">2</button>
        <button onclick="typeNum('3')">3</button>
        <button onclick="typeNum('4')">4</button>
        <button onclick="typeNum('5')">5</button>
        <button onclick="typeNum('6')">6</button>
        <button onclick="typeNum('7')">7</button>
        <button onclick="typeNum('8')">8</button>
        <button onclick="typeNum('9')">9</button>
        <button onclick="typeNum(',')">,</button>
        <button onclick="typeNum('0')">0</button>
        <button class="btn-del" onclick="typeNum('DEL')">⌫</button>
        <button class="btn-ok" onclick="hideNumpad()">OK</button>
    </div>

    <!-- CONTENEUR MASSES -->
    <div id="content-masse" class="app-container">
        <div class="setup-zone">
            <input type="text" id="val-masse" placeholder="Nombre" style="width:100px" readonly onclick="showNumpad('val-masse')">
            <select id="dep-masse">
                <option value="0">t</option><option value="1">q</option><option value="2">.</option>
                <option value="3" selected>kg</option><option value="4">hg</option><option value="5">dag</option>
                <option value="6">g</option><option value="7">dg</option><option value="8">cg</option><option value="9">mg</option>
            </select>
            <span>➔</span>
            <select id="arr-masse">
                <option value="0">t</option><option value="1">q</option><option value="2">.</option>
                <option value="3">kg</option><option value="4">hg</option><option value="5">dag</option>
                <option value="6" selected>g</option><option value="7">dg</option><option value="8">cg</option><option value="9">mg</option>
            </select>
            <!-- Bouton adapté à l'étape 1 -->
            <button id="btn-masse" class="btn-action" onclick="gererEtape('masse')">1. Placer l'unité</button>
        </div>
        
        <div class="main-layout">
            <div class="left-panel">
                <p class="instruction" id="aide-masse">Cliquez sur "Nombre" pour taper la valeur.</p>
                <div class="table-wrapper" id="wrap-masse">
                    <table id="tab-masse">
                        <thead>
                            <tr><th>t</th><th>q</th><th>.</th><th>kg</th><th>hg</th><th>dag</th><th>g</th><th>dg</th><th>cg</th><th>mg</th></tr>
                        </thead>
                        <tbody id="body-masse">
                            <tr id="masse-L0" class="ligne-active"><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                            <tr id="masse-L1"><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                            <tr id="masse-L2"><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                            <tr id="masse-L3"><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
                        </tbody>
                    </table>
                    <div id="virgule-masse" class="virgule-mobile">,</div>
                </div>
            </div>
            <div class="right-panel">
                <h3 class="results-title">📊 Résultats</h3>
                <div id="res-list-masse" class="results-container"></div>
            </div>
        </div>
    </div>

    <!-- CONTENEUR VOLUMES -->
    <div id="content-volume" class="app-container hidden">
        <div class="setup-zone">
            <input type="text" id="val-volume" placeholder="Nombre" style="width:100px" readonly onclick="showNumpad('val-volume')">
            <select id="dep-volume">
                <optgroup label="Volumes (m³)">
                    <option value="0">m³</option>
                    <option value="3">dm³</option>
                    <option value="6">cm³</option>
                </optgroup>
                <optgroup label="Capacités (L)">
                    <option value="0">kL</option><option value="1">hL</option><option value="2">daL</option>
                    <option value="3" selected>L</option><option value="4">dL</option><option value="5">cL</option><option value="6">mL</option>
                </optgroup>
            </select>
            <span>➔</span>
            <select id="arr-volume">
                <optgroup label="Volumes (m³)">
                    <option value="0">m³</option>
                    <option value="3">dm³</option>
                    <option value="6" selected>cm³</option>
                </optgroup>
                <optgroup label="Capacités (L)">
                    <option value="3">L</option><option value="6">mL</option>
                </optgroup>
            </select>
            <!-- Bouton adapté à l'étape 1 -->
            <button id="btn-volume" class="btn-action" onclick="gererEtape('volume')">1. Placer l'unité</button>
        </div>

        <div class="main-layout">
            <div class="left-panel">
                <p class="instruction" id="aide-volume">Cliquez sur "Nombre" pour taper le volume.</p>
                <div class="table-wrapper" id="wrap-volume">
                    <table id="tab-volume">
                        <thead>
                            <tr>
                                <th class="bg-yellow" style="width: 14.28%;">m³</th>
                                <th style="background-color: #fff; width: 14.28%; border-bottom: 2px solid #000;"></th>
                                <th style="background-color: #fff; width: 14.28%; border-bottom: 2px solid #000;"></th>
                                <th class="bg-yellow" style="width: 14.28%;">dm³</th>
                                <th style="background-color: #fff; width: 14.28%; border-bottom: 2px solid #000;"></th>
                                <th style="background-color: #fff; width: 14.28%; border-bottom: 2px solid #000;"></th>
                                <th class="bg-yellow" style="width: 14.28%;">cm³</th>
                            </tr>
                            <tr>
                                <th class="bg-green-light"><strong>kL</strong></th>
                                <th class="bg-blue-light">hL</th>
                                <th class="bg-blue-light">daL</th>
                                <th class="highlight-l">L</th>
                                <th class="bg-blue-light">dL</th>
                                <th class="bg-blue-light">cL</th>
                                <th class="highlight-l">mL</th>
                            </tr>
                        </thead>
                        <tbody id="body-volume">
                            <tr id="volume-L0" class="ligne-active"><td></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td></tr>
                            <tr id="volume-L1"><td></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td></tr>
                            <tr id="volume-L2"><td></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td></tr>
                            <tr id="volume-L3"><td></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td><td></td><td></td><td class="border-left-green border-right-green border-bottom-green"></td></tr>
                        </tbody>
                    </table>
                    <div id="virgule-volume" class="virgule-mobile">,</div>
                </div>
            </div>
            <div class="right-panel">
                <h3 class="results-title">📊 Résultats</h3>
                <div id="res-list-volume" class="results-container"></div>
            </div>
        </div>
    </div>

    <button onclick="window.location.reload()" class="btn-action" style="margin-top:20px; padding: 15px; width:1150px; border-radius: 8px;">Réinitialiser tout le fichier</button>

    <script>
        // --- GESTION DU PAVE NUMERIQUE ---
        let inputActif = null;

        function showNumpad(inputId) {
            inputActif = document.getElementById(inputId);
            document.getElementById('numpad').classList.remove('hidden');
        }

        function hideNumpad() {
            document.getElementById('numpad').classList.add('hidden');
            inputActif = null;
        }

        function typeNum(char) {
            if (!inputActif) return;
            if (char === 'DEL') {
                inputActif.value = inputActif.value.slice(0, -1);
            } else if (char === ',') {
                if (!inputActif.value.includes(',')) inputActif.value += ',';
            } else {
                inputActif.value += char;
            }
        }

        // --- GESTION DE L'ANIMATION PAS A PAS ---
        let state = {
            masse: { etape: 0, ligne: 0, memo: {}, resultAdded: false },
            volume: { etape: 0, ligne: 0, memo: {}, resultAdded: false }
        };

        function switchTab(tab) {
            hideNumpad();
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById('content-masse').classList.toggle('hidden', tab !== 'masse');
            document.getElementById('content-volume').classList.toggle('hidden', tab !== 'volume');
        }

        function getLabel(type, i) {
            if (type === 'masse') return ["t", "q", ".", "kg", "hg", "dag", "g", "dg", "cg", "mg"][i];
            if (type === 'volume') return ["kL (m³)", "hL", "daL", "L (dm³)", "dL", "cL", "mL (cm³)"][i];
        }

        function calculerResultat(valStr, depIndex, arrIndex) {
            let num = parseFloat(valStr.replace(',', '.'));
            let factor = Math.pow(10, arrIndex - depIndex);
            let res = num * factor;
            return parseFloat(res.toPrecision(12)).toString().replace('.', ',');
        }

        function gererEtape(type) {
            hideNumpad();
            let s = state[type];
            const valInput = document.getElementById(`val-${type}`).value;
            if (!valInput) return;
            
            const selectDep = document.getElementById(`dep-${type}`);
            const selectArr = document.getElementById(`arr-${type}`);
            const dep = parseInt(selectDep.value);
            const arr = parseInt(selectArr.value);
            
            const aide = document.getElementById(`aide-${type}`);
            const btn = document.getElementById(`btn-${type}`);
            const virgule = document.getElementById(`virgule-${type}`);
            const resList = document.getElementById(`res-list-${type}`);
            
            const tr = document.getElementById(`${type}-L${s.ligne}`);
            const td = tr.getElementsByTagName('td');

            if (s.etape === 0) {
                // ETAPE 1 : ON NE PLACE QUE L'UNITE. PAS DE VIRGULE ENCORE.
                let valStr = valInput.replace(',', '.');
                let partieEntiere = valStr.split('.')[0];
                if (partieEntiere === "") partieEntiere = "0";
                
                let chiffreU = partieEntiere[partieEntiere.length - 1];
                s.memo = { valStr: valInput, partieEntiere, chiffreU, dep, arr, decimales: valStr.split('.')[1] || "" };
                s.resultAdded = false; 

                td[dep].innerHTML = `<span class="chiffre-unite">${chiffreU}</span>`;
                
                aide.innerHTML = `<b>Étape 1</b> : On a placé le chiffre des unités (<span class="chiffre-unite">${chiffreU}</span>) dans la colonne <b>${getLabel(type, dep)}</b>.`;
                btn.innerText = "2. Placer le reste";
                s.etape = 1;

            } else if (s.etape === 1) {
                // ETAPE 2 : ON PLACE LE RESTE ET LA VIRGULE APPARAIT
                let gauche = s.memo.partieEntiere.slice(0, -1);
                let colG = s.memo.dep - 1;
                for (let i = gauche.length - 1; i >= 0; i--) {
                    if (colG >= 0) td[colG].innerText = gauche[i];
                    colG--;
                }
                let droite = s.memo.decimales;
                let colD = s.memo.dep + 1;
                for (let i = 0; i < droite.length; i++) {
                    if (colD < td.length) td[colD].innerText = droite[i];
                    colD++;
                }
                
                // La virgule de départ apparaît !
                virgule.style.display = "block";
                placerVirgule(type, s.memo.dep, s.ligne);
                
                aide.innerHTML = `<b>Étape 2</b> : On a placé les autres chiffres et la virgule.`;
                btn.innerText = "3. Déplacer la virgule";
                s.etape = 2;

            } else if (s.etape === 2) {
                // ETAPE 3 : ANIMATION DE LA VIRGULE
                btn.disabled = true;
                
                lancerAnim(type, s.memo.dep, s.memo.arr, td, () => {
                    identifierZeros(td, s.memo.arr);
                    let necessaire = false;
                    for (let i = s.memo.arr + 1; i < td.length; i++) {
                        if (td[i].innerText !== "" && td[i].innerText !== "0") { necessaire = true; break; }
                    }
                    if (!necessaire) virgule.style.display = "none";
                    
                    if (!s.resultAdded) {
                        let resCalcul = calculerResultat(s.memo.valStr, s.memo.dep, s.memo.arr);
                        let txtDep = selectDep.options[selectDep.selectedIndex].text;
                        let txtArr = selectArr.options[selectArr.selectedIndex].text;
                        
                        let newItem = document.createElement('div');
                        newItem.className = 'result-item';
                        newItem.innerHTML = `<span style="font-size:0.9em; opacity:0.8; margin-right:5px;">L. ${s.ligne + 1} :</span> ${s.memo.valStr} ${txtDep} <b>= ${resCalcul} ${txtArr}</b>`;
                        resList.appendChild(newItem);
                        s.resultAdded = true;
                    }
                    
                    aide.innerHTML = "<b>Étape 3 terminée !</b> Cliquez sur les zéros inutiles dans le tableau pour les effacer.";
                    btn.innerText = "Ligne Suivante";
                    btn.disabled = false; 
                    s.etape = 3;
                });

            } else if (s.etape === 3) {
                // ETAPE 4 : PREPARATION NOUVELLE LIGNE
                tr.classList.remove('ligne-active');
                tr.classList.add('ligne-terminee');
                for(let cell of td) { cell.onclick = null; cell.classList.remove('zero-cliquable'); }
                s.ligne++;
                if (s.ligne > 3) { 
                    btn.disabled = true; 
                    aide.innerText = "Le tableau est plein. Cliquez sur Réinitialiser tout en bas."; 
                }
                else {
                    document.getElementById(`${type}-L${s.ligne}`).classList.add('ligne-active');
                    virgule.style.display = "none";
                    s.etape = 0;
                    btn.innerText = "1. Placer l'unité";
                    document.getElementById(`val-${type}`).value = "";
                    aide.innerText = "Prêt pour une autre conversion.";
                }
            }
        }

        function placerVirgule(type, col, lig) {
            const tab = document.getElementById(`tab-${type}`);
            const headerOffset = (type === 'volume' ? 2 : 1);
            const cell = tab.rows[lig + headerOffset].cells[col];
            const virgule = document.getElementById(`virgule-${type}`);
            const wrap = document.getElementById(`wrap-${type}`).getBoundingClientRect();
            const rect = cell.getBoundingClientRect();

            virgule.style.left = (rect.right - wrap.left - 8) + "px";
            virgule.style.top = (rect.top - wrap.top + 5) + "px";
        }

        async function lancerAnim(type, start, end, cells, cb) {
            let curr = start;
            let dir = start < end ? 1 : -1;
            while (curr !== end) {
                curr += dir;
                placerVirgule(type, curr, state[type].ligne);
                await new Promise(r => setTimeout(r, 600));
                if (cells[curr].innerText === "") cells[curr].innerHTML = `<span class="zero-ajoute">0</span>`;
            }
            cb();
        }

        function identifierZeros(cells, posV) {
            for (let i = 0; i < posV; i++) {
                if (cells[i].innerText === "0") {
                    cells[i].classList.add('zero-cliquable');
                    cells[i].onclick = function() { this.innerText = ""; this.classList.remove('zero-cliquable'); };
                } else if (cells[i].innerText !== "") break;
            }
            let significatif = false;
            for(let j = posV + 1; j < cells.length; j++) if(cells[j].innerText !== "" && cells[j].innerText !== "0") significatif = true;
            if (!significatif) {
                for (let i = cells.length - 1; i > posV; i--) {
                    if (cells[i].innerText === "0") {
                        cells[i].classList.add('zero-cliquable');
                        cells[i].onclick = function() { this.innerText = ""; this.classList.remove('zero-cliquable'); };
                    } else if (cells[i].innerText !== "") break;
                }
            }
        }
    </script>
</body>
</html>
