<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCM Électricité 4ème - Contrôle Final</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e40af;
            --success: #22c55e;
            --error: #ef4444;
            --background: #f3f4f6;
            --surface: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: #1f2937;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 9999px;
            height: 10px;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            border-radius: 9999px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Question Section */
        .question-box {
            margin-bottom: 25px;
        }

        .level-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }
        .level-easy { background-color: #3b82f6; }
        .level-medium { background-color: #f59e0b; }
        .level-hard { background-color: #ef4444; }

        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .schematic-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            background: #fff;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid #e5e7eb;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .option-btn.correct {
            background-color: #dcfce7;
            border-color: var(--success);
            color: #166534;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: var(--error);
            color: #991b1b;
        }

        /* Feedback & Controls */
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .feedback.show { display: block; }
        .feedback-correct { background-color: #dcfce7; border-left: 5px solid var(--success); }
        .feedback-wrong { background-color: #fee2e2; border-left: 5px solid var(--error); }

        .next-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            align-self: flex-end;
            display: none;
        }
        .next-btn:hover { background-color: var(--secondary); }

        /* Results */
        .results {
            text-align: center;
            display: none;
        }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            margin: 0 auto 20px auto;
        }
        .restart-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* SVG Styles */
        svg { max-width: 100%; height: auto; }
        .circuit-wire { stroke: black; stroke-width: 2; fill: none; }
        .circuit-component { stroke: black; stroke-width: 2; fill: white; }
        .component-text { font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; }
        .measurement-text { fill: #dc2626; font-size: 14px; font-weight: bold; }
        .zone-label { font-size: 18px; font-weight: bold; fill: white; stroke: none; }
        .zone-bg { fill: #2563eb; opacity: 0.8; }
        .node-point { fill: #ef4444; stroke: black; stroke-width: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Quiz Électricité 4ème</h1>
    
    <div id="quiz-screen">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <div class="question-box">
            <span id="level-badge" class="level-badge level-easy">Niveau</span>
            <div class="question-text" id="question-text">Chargement de la question...</div>
            <div id="schematic-area" class="schematic-container" style="display:none;"></div>
        </div>

        <div class="options-grid" id="options-container">
            </div>

        <div id="feedback" class="feedback">
            <strong id="feedback-title"></strong>
            <p id="feedback-text"></p>
        </div>

        <button id="next-btn" class="next-btn" onclick="nextQuestion()">Question Suivante</button>
    </div>

    <div id="result-screen" class="results">
        <h2>Quiz Terminé !</h2>
        <div class="score-circle" id="final-score">0/10</div>
        <p id="result-message"></p>
        <button class="restart-btn" onclick="startQuiz()">Recommencer avec de nouvelles questions</button>
    </div>
</div>

<script>
    // --- SCHEMAS SVG ---
    
    const svgs = {
        serie_2lampes: (vG, vL1, vL2) => `
            <svg width="300" height="150" viewBox="0 0 300 150">
                <rect x="50" y="20" width="200" height="110" class="circuit-wire" />
                <circle cx="150" cy="20" r="15" class="circuit-component" />
                <text x="150" y="20" class="component-text">G</text>
                <text x="150" y="45" class="measurement-text" text-anchor="middle">${vG || 'Ug'}</text>
                <text x="130" y="15" font-size="12">-</text> <text x="170" y="15" font-size="12">+</text>
                <circle cx="50" cy="75" r="15" class="circuit-component" />
                <text x="80" y="75" class="component-text">L1</text>
                <text x="20" y="75" class="measurement-text" text-anchor="end">${vL1 || 'U1'}</text>
                <circle cx="250" cy="75" r="15" class="circuit-component" />
                <text x="220" y="75" class="component-text">L2</text>
                <text x="280" y="75" class="measurement-text" text-anchor="start">${vL2 || 'U2'}</text>
            </svg>`,
        
        serie_intensite: () => `
            <svg width="300" height="150" viewBox="0 0 300 150">
                <rect x="50" y="20" width="200" height="110" class="circuit-wire" />
                <circle cx="150" cy="20" r="15" class="circuit-component" />
                <text x="150" y="20" class="component-text">G</text>
                <circle cx="50" cy="40" r="10" stroke="black" stroke-width="1" fill="white" />
                <text x="50" y="43" font-size="10" text-anchor="middle">A1</text>
                <text x="35" y="43" class="measurement-text" text-anchor="end">I1</text>
                <circle cx="250" cy="100" r="10" stroke="black" stroke-width="1" fill="white" />
                <text x="250" y="103" font-size="10" text-anchor="middle">A2</text>
                <text x="265" y="103" class="measurement-text" text-anchor="start">I2</text>
                <circle cx="50" cy="75" r="15" class="circuit-component" />
                <text x="50" y="75" class="component-text">L1</text>
                <circle cx="250" cy="75" r="15" class="circuit-component" />
                <text x="250" y="75" class="component-text">L2</text>
            </svg>`,

        derivation_2lampes_formule: () => `
            <svg width="300" height="200" viewBox="0 0 300 200">
                <rect x="50" y="20" width="200" height="160" class="circuit-wire" />
                <line x1="50" y1="100" x2="250" y2="100" class="circuit-wire" />
                <circle cx="150" cy="20" r="15" class="circuit-component" />
                <text x="150" y="20" class="component-text">G</text>
                <text x="180" y="35" class="measurement-text">Ig</text>
                <circle cx="150" cy="100" r="15" class="circuit-component" />
                <text x="150" y="80" class="component-text">L1</text>
                <text x="180" y="115" class="measurement-text">I1</text>
                <circle cx="150" cy="180" r="15" class="circuit-component" />
                <text x="150" y="160" class="component-text">L2</text>
                <text x="180" y="195" class="measurement-text">I2</text>
                <circle cx="50" cy="100" r="3" fill="black" />
                <circle cx="250" cy="100" r="3" fill="black" />
            </svg>`,

        instrument: (type) => `
            <svg width="100" height="100" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="white" />
                <text x="50" y="55" font-family="sans-serif" font-size="40" text-anchor="middle" font-weight="bold">${type}</text>
            </svg>`,
            
        identification: () => `
            <svg width="350" height="220" viewBox="0 0 350 220">
                <rect x="50" y="40" width="250" height="160" class="circuit-wire" />
                <line x1="50" y1="120" x2="300" y2="120" class="circuit-wire" />
                <circle cx="175" cy="40" r="15" class="circuit-component" />
                <text x="175" y="40" class="component-text">G</text>
                <circle cx="175" cy="120" r="15" class="circuit-component" />
                <text x="175" y="120" class="component-text">L1</text>
                <circle cx="175" cy="200" r="15" class="circuit-component" />
                <text x="175" y="200" class="component-text">L2</text>
                <rect x="80" y="20" width="40" height="40" rx="5" class="zone-bg" />
                <text x="100" y="45" text-anchor="middle" class="zone-label">A</text>
                <rect x="220" y="100" width="40" height="40" rx="5" class="zone-bg" />
                <text x="240" y="125" text-anchor="middle" class="zone-label">B</text>
                <circle cx="50" cy="120" r="8" class="node-point" />
                <text x="50" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="white">D</text>
            </svg>`,

        // SCHEMA HORIZONTAL AMELIORE - SANS TRAIT CONTINU
        horizontal_test: () => `
            <svg width="350" height="200" viewBox="0 0 350 200">
                <line x1="40" y1="40" x2="310" y2="40" class="circuit-wire" />
                <line x1="40" y1="160" x2="310" y2="160" class="circuit-wire" />
                
                <circle cx="40" cy="100" r="15" class="circuit-component" />
                <line x1="40" y1="40" x2="40" y2="85" class="circuit-wire" />
                <line x1="40" y1="115" x2="40" y2="160" class="circuit-wire" />
                <text x="40" y="100" class="component-text">G</text>
                <text x="25" y="70" font-size="14" font-weight="bold">+</text>

                <circle cx="80" cy="40" r="12" stroke="black" stroke-width="2" fill="white" />
                <text x="80" y="44" class="component-text" font-size="10">A</text>
                <text x="80" y="20" fill="red" font-size="12" font-weight="bold" text-anchor="middle">Ig</text>

                <line x1="150" y1="40" x2="150" y2="160" class="circuit-wire" />
                <circle cx="150" cy="100" r="15" class="circuit-component" />
                <text x="150" y="100" class="component-text">M</text>
                <text x="165" y="100" fill="red" font-size="12" font-weight="bold">I1</text>
                
                <line x1="230" y1="40" x2="230" y2="65" class="circuit-wire" />
                <circle cx="230" cy="80" r="15" class="circuit-component" /> 
                <line x1="222" y1="72" x2="238" y2="88" stroke="black" stroke-width="2" />
                <line x1="238" y1="72" x2="222" y2="88" stroke="black" stroke-width="2" />
                <text x="210" y="80" font-size="12" font-weight="bold">L</text>
                
                <line x1="230" y1="95" x2="230" y2="115" class="circuit-wire" />
                
                <circle cx="230" cy="115" r="3" fill="white" stroke="black" stroke-width="2" /> <circle cx="230" cy="145" r="3" fill="white" stroke="black" stroke-width="2" /> <line x1="230" y1="145" x2="245" y2="125" stroke="black" stroke-width="2" />
                
                <line x1="230" y1="149" x2="230" y2="160" class="circuit-wire" />
                
                <text x="245" y="135" font-weight="bold" font-size="12">S1</text>

                <line x1="310" y1="40" x2="310" y2="65" class="circuit-wire" />
                <circle cx="310" cy="80" r="15" class="circuit-component" />
                <text x="310" y="80" class="component-text">M2</text>
                
                <line x1="310" y1="95" x2="310" y2="115" class="circuit-wire" />
                
                <circle cx="310" cy="115" r="3" fill="white" stroke="black" stroke-width="2" />
                <circle cx="310" cy="145" r="3" fill="white" stroke="black" stroke-width="2" />
                <line x1="310" y1="145" x2="325" y2="125" stroke="black" stroke-width="2" />
                
                <line x1="310" y1="149" x2="310" y2="160" class="circuit-wire" />
                
                <text x="325" y="135" font-weight="bold" font-size="12">S2</text>

                <circle cx="150" cy="40" r="3" fill="black" />
                <circle cx="230" cy="40" r="3" fill="black" />
                <circle cx="310" cy="40" r="3" fill="black" />
            </svg>`,

        // SCHEMA SECURITE / FUSIBLE
        fuse_scenario: () => `
            <svg width="350" height="200" viewBox="0 0 350 200">
                <rect x="40" y="30" width="280" height="140" class="circuit-wire" />
                <circle cx="40" cy="100" r="18" class="circuit-component" />
                <text x="40" y="100" class="component-text">G</text>
                <text x="20" y="85" font-size="12" font-weight="bold">+</text>

                <rect x="80" y="22" width="40" height="16" fill="white" stroke="black" stroke-width="2" />
                <line x1="80" y1="30" x2="120" y2="30" stroke="black" stroke-width="1" />
                <text x="100" y="15" font-size="12" font-weight="bold" text-anchor="middle">Fusible 5A</text>

                <circle cx="160" cy="30" r="3" fill="black" />
                <circle cx="190" cy="30" r="3" fill="black" />
                <line x1="160" y1="30" x2="190" y2="30" stroke="black" stroke-width="2" />
                <text x="175" y="20" font-size="10" text-anchor="middle">K</text>
                
                

                <line x1="220" y1="30" x2="220" y2="170" class="circuit-wire" />
                <circle cx="220" cy="100" r="12" class="circuit-component" />
                <line x1="214" y1="94" x2="226" y2="106" stroke="black" stroke-width="2" />
                <line x1="226" y1="94" x2="214" y2="106" stroke="black" stroke-width="2" />
                <text x="235" y="100" font-size="10" font-weight="bold">2A</text>

                <line x1="270" y1="30" x2="270" y2="170" class="circuit-wire" />
                <circle cx="270" cy="100" r="12" class="circuit-component" />
                <line x1="264" y1="94" x2="276" y2="106" stroke="black" stroke-width="2" />
                <line x1="276" y1="94" x2="264" y2="106" stroke="black" stroke-width="2" />
                <text x="285" y="100" font-size="10" font-weight="bold">2A</text>

                <line x1="320" y1="30" x2="320" y2="170" class="circuit-wire" />
                <circle cx="320" cy="100" r="12" class="circuit-component" />
                <line x1="314" y1="94" x2="326" y2="106" stroke="black" stroke-width="2" />
                <line x1="326" y1="94" x2="314" y2="106" stroke="black" stroke-width="2" />
                <text x="335" y="100" font-size="10" font-weight="bold">2A</text>

                <circle cx="220" cy="30" r="3" fill="black" />
                <circle cx="270" cy="30" r="3" fill="black" />
                <circle cx="320" cy="30" r="3" fill="black" />
            </svg>`
    };

    // --- BANQUE DE QUESTIONS ---
    
    const questionPool = [
        // --- SCENARIO MOTEURS/LAMPE (S1/S2) ---
        {
            id: 301, level: 'hard', type: 'schema',
            svg: svgs.horizontal_test(),
            question: "Loi d'additivité : On ferme l'interrupteur S1 (on allume la Lampe L). Comment varie l'intensité Ig ?",
            options: ["Elle augmente", "Elle diminue", "Elle ne change pas", "Elle devient nulle"],
            correct: 0,
            rationale: "Dans un circuit en dérivation, ajouter une branche augmente l'intensité totale fournie par le générateur (loi d'additivité)."
        },
        {
            id: 302, level: 'hard', type: 'schema',
            svg: svgs.horizontal_test(),
            question: "Calcul : Le moteur M consomme 0.2 A. Si on ferme S1, la lampe L consomme 0.1 A. Que vaut alors Ig ?",
            options: ["0.3 A", "0.1 A", "0.2 A", "On ne peut pas savoir"],
            correct: 0,
            rationale: "Dans la branche principale, les intensités s'ajoutent : Ig = I(M) + I(L) = 0.2 + 0.1 = 0.3 A."
        },
        {
            id: 303, level: 'hard', type: 'schema',
            svg: svgs.horizontal_test(),
            question: "Calcul Complet : Si on ferme aussi S2 et que le moteur M2 consomme 0.3 A, quelle sera l'intensité totale Ig ?",
            options: ["0.6 A", "0.3 A", "0.5 A", "1.0 A"],
            correct: 0,
            rationale: "Loi d'additivité des intensités : Ig = 0.2 + 0.1 + 0.3 = 0.6 A."
        },

        // --- NOUVEAU SCENARIO : SECURITE & FUSIBLE (AVEC RAPPEL COURS) ---
        {
            id: 401, level: 'hard', type: 'schema',
            svg: svgs.fuse_scenario(),
            question: "Sécurité : Ce circuit comporte un fusible limité à 5 A. Si on allume les trois lampes (2A chacune) en même temps, que se passe-t-il ?",
            options: ["Tout fonctionne bien", "Les lampes grillent", "Le fusible fond (coupe le circuit)", "L'intensité diminue"],
            correct: 2,
            rationale: "Rappel : Un fusible est un fil métallique conçu pour fondre si l'intensité dépasse sa valeur limite (ici 5A). Comme 2+2+2=6A, il y a surintensité et le fusible fond pour protéger l'installation d'un incendie."
        },
        {
            id: 402, level: 'medium', type: 'text',
            question: "À quoi sert un disjoncteur ou un fusible dans une installation électrique ?",
            options: ["À économiser l'électricité", "À ouvrir le circuit en cas de surintensité (incendie)", "À augmenter la tension", "À rien"],
            correct: 1,
            rationale: "Rappel : Ces dispositifs de protection ouvrent le circuit automatiquement en cas de surintensité (surcharge ou court-circuit) pour éviter l'échauffement des fils et les incendies."
        },
        {
            id: 403, level: 'medium', type: 'text',
            question: "Qu'est-ce qu'une surintensité ?",
            options: ["Quand la tension est trop faible", "Quand l'intensité dépasse la valeur limite supportée par les fils", "Quand il n'y a plus de courant", "Quand les lampes brillent trop fort"],
            correct: 1,
            rationale: "La surintensité (trop d'ampères) provoque un échauffement dangereux des câbles électriques (effet Joule), ce qui peut déclencher un incendie."
        },

        // --- QUESTIONS CLASSIQUES (Cours) ---
        {
            id: 101, level: 'easy', type: 'text',
            question: "Complétez : Dans un circuit en SÉRIE, la tension du générateur est égale à la ______ des tensions des récepteurs.",
            options: ["somme", "différence", "moyenne", "multiplication"],
            correct: 0,
            rationale: "Loi d'additivité des tensions : Ug = U1 + U2."
        },
        {
            id: 102, level: 'easy', type: 'text',
            question: "Dans un circuit en SÉRIE, l'intensité du courant est...",
            options: ["la même partout", "plus forte au début", "divisée par 2", "nulle"],
            correct: 0,
            rationale: "Loi d'unicité : le courant ne s'use pas, c'est le même débit partout."
        },
        {
            id: 103, level: 'medium', type: 'schema',
            svg: svgs.serie_2lampes(),
            question: "SÉRIE : Quelle relation mathématique est vraie pour les tensions ?",
            options: ["Ug = U1 + U2", "Ug = U1 = U2", "Ug = U1 - U2", "Ug + U1 = U2"],
            correct: 0,
            rationale: "Loi d'additivité : la tension du générateur se répartit entre les lampes."
        },
        {
            id: 105, level: 'medium', type: 'schema',
            svg: svgs.derivation_2lampes_formule(),
            question: "DÉRIVATION : Quelle formule décrit la loi des intensités (loi des nœuds) ?",
            options: ["Ig = I1 + I2", "Ig = I1 = I2", "Ig + I1 = I2", "Ig = I1 x I2"],
            correct: 0,
            rationale: "L'intensité principale est la somme des intensités des branches dérivées."
        },
        {
            id: 11, level: 'hard', type: 'text',
            question: "Pourquoi est-il dangereux de brancher trop d'appareils sur une multiprise ?",
            options: ["La tension baisse", "Risque de surintensité et d'incendie", "Les appareils vont griller", "Ça consomme moins"],
            correct: 1,
            rationale: "Chaque appareil branché en dérivation augmente l'intensité totale. Si elle dépasse la limite de la multiprise, il y a risque d'incendie."
        }
    ];

    // --- MOTEUR DU JEU ---
    
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz() {
        score = 0;
        currentIndex = 0;
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        // Sélectionner 10 questions au hasard
        const shuffled = shuffleArray([...questionPool]);
        currentQuestions = shuffled.slice(0, 10);
        
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        
        document.getElementById('question-text').textContent = `${currentIndex + 1}. ${q.question}`;
        document.getElementById('level-badge').textContent = q.level === 'easy' ? 'Facile' : (q.level === 'medium' ? 'Moyen' : 'Difficile');
        document.getElementById('level-badge').className = `level-badge level-${q.level}`;
        
        const progressPct = ((currentIndex) / 10) * 100;
        document.getElementById('progress-bar').style.width = `${progressPct}%`;

        const schematicArea = document.getElementById('schematic-area');
        if (q.type === 'schema' && q.svg) {
            schematicArea.style.display = 'flex';
            schematicArea.innerHTML = q.svg;
        } else {
            schematicArea.style.display = 'none';
        }

        document.getElementById('feedback').className = 'feedback';
        document.getElementById('next-btn').style.display = 'none';

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(index, q);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, question) {
        const buttons = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        
        buttons.forEach(btn => btn.disabled = true);

        if (selectedIndex === question.correct) {
            score++;
            buttons[selectedIndex].classList.add('correct');
            feedback.className = 'feedback show feedback-correct';
            document.getElementById('feedback-title').textContent = "✅ Correct !";
        } else {
            buttons[selectedIndex].classList.add('wrong');
            buttons[question.correct].classList.add('correct');
            feedback.className = 'feedback show feedback-wrong';
            document.getElementById('feedback-title').textContent = "❌ Incorrect";
        }

        document.getElementById('feedback-text').textContent = question.rationale;
        document.getElementById('next-btn').style.display = 'block';
        document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / 10) * 100}%`;
    }

    function nextQuestion() {
        currentIndex++;
        if (currentIndex < 10) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').textContent = `${score}/10`;
        
        const msg = document.getElementById('result-message');
        if (score === 10) msg.textContent = "Excellent ! 20/20 ! 🏆";
        else if (score >= 7) msg.textContent = "Très bon travail !";
        else if (score >= 5) msg.textContent = "Moyenne atteinte.";
        else msg.textContent = "Il faut revoir le cours.";
    }

    startQuiz();

</script>

</body>
</html>
